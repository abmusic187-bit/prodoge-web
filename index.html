<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRODOGE AI v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-text { text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-glow:active { transform: scale(0.95); box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body class="pb-24">

    <div id="auth-screen" class="fixed inset-0 z-[200] bg-black flex flex-col items-center justify-center p-6">
        <div class="w-24 h-24 bg-blue-600 rounded-[2.5rem] mb-8 flex items-center justify-center shadow-[0_0_50px_rgba(37,99,235,0.3)]">
            <span class="text-white text-4xl font-black italic">P</span>
        </div>
        <h1 class="text-4xl font-black tracking-tighter mb-2 italic">PRODOGE <span class="text-blue-500">AI</span></h1>
        <p class="text-gray-500 text-[10px] tracking-[0.5em] uppercase mb-12">Neural Network Terminal</p>
        <button onclick="login()" class="w-full max-w-xs glass p-5 rounded-3xl flex items-center justify-center gap-4 border border-white/10 hover:bg-white/5 transition-all">
            <img src="https://www.google.com/favicon.ico" class="w-5 h-5">
            <span class="font-bold text-sm uppercase tracking-widest text-white">Initialize Node</span>
        </button>
    </div>

    <header class="p-6 flex justify-between items-center sticky top-0 z-50 bg-black/50 backdrop-blur-lg">
        <div>
            <p id="user-name" class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">Loading...</p>
            <h2 class="text-xl font-black italic">CORE</h2>
        </div>
        <div class="glass px-4 py-2 rounded-2xl flex flex-col items-end">
            <span class="text-[8px] text-gray-500 font-bold uppercase">Balance</span>
            <div class="flex items-center gap-2">
                <span id="bal" class="text-lg font-mono font-bold">0.00</span>
                <span class="text-blue-500 text-[10px] font-black">ELITE</span>
            </div>
        </div>
    </header>

    <main class="p-6 max-w-md mx-auto">
        <div id="tab-home" class="tab-content active">
            <div class="glass rounded-[3rem] p-10 text-center mb-6 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-blue-500 to-transparent opacity-50"></div>
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4">Real-time Yield</p>
                <h3 id="yield" class="text-5xl font-mono font-bold neon-text mb-4 text-white">0.000000</h3>
                <p id="staked" class="text-[11px] font-bold text-blue-400 bg-blue-500/10 py-2 px-4 rounded-full inline-block uppercase">0.00 STAKED</p>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="stake()" class="bg-blue-600 p-6 rounded-[2rem] font-black uppercase text-xs btn-glow text-white">Stake All</button>
                <button onclick="harvest()" class="glass p-6 rounded-[2rem] font-black uppercase text-xs btn-glow text-white">Harvest</button>
            </div>
        </div>

        <div id="tab-tasks" class="tab-content">
            <h2 class="text-2xl font-black italic mb-6">MISSIONS</h2>
            <div id="task-list" class="space-y-4 text-center text-gray-500 text-xs uppercase tracking-widest py-10">
                No active missions in your sector...
            </div>
        </div>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 h-20 glass rounded-[2.5rem] flex justify-around items-center border-white/10 shadow-2xl">
        <button onclick="showTab('home')" class="text-2xl opacity-100 transition-all hover:scale-110">🏠</button>
        <button onclick="showTab('tasks')" class="text-2xl opacity-40 transition-all hover:scale-110">🛰️</button>
        <button onclick="location.reload()" class="text-2xl opacity-40 transition-all hover:scale-110">🔄</button>
    </nav>

    <script>
        // YOUR CUSTOM CREDENTIALS INTEGRATED
        const SB_URL = "https://htngfzwclkqsffozxfuo.supabase.co";
        const SB_KEY = "sb_publishable_2LJdcMlfhcEyNl_EMUx-2w_Ms5ZtJ5g";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let profile = null;

        async function login() {
            const { error } = await sb.auth.signInWithOAuth({ 
                provider: 'google',
                options: { 
                    redirectTo: window.location.origin 
                }
            });
            if (error) console.error("Login Error:", error.message);
        }

        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                document.getElementById('auth-screen').style.display = 'none';
                
                // Fetch user profile
                const { data, error } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
                
                if (data) {
                    profile = data;
                    render();
                    setInterval(updateMining, 1000);
                } else {
                    console.log("Profile not found. If this is a new user, wait for the SQL Trigger to finish.");
                    // Optional: Add a small delay and retry once
                    setTimeout(init, 2000);
                }
            }
        }

        function render() {
            document.getElementById('user-name').innerText = profile.username || "Anonymous Node";
            document.getElementById('bal').innerText = Number(profile.tokens).toFixed(2);
            document.getElementById('staked').innerText = Number(profile.staked_tokens).toFixed(2) + " STAKED";
        }

        function updateMining() {
            if (!profile || !profile.staked_tokens) return;
            const now = new Date();
            const last = new Date(profile.last_sync_time);
            const diff = (now - last) / 1000;
            const earned = (profile.staked_tokens * 0.04 * diff) / 86400;
            document.getElementById('yield').innerText = earned.toFixed(6);
        }

        async function harvest() {
            const { error } = await sb.rpc('process_mining_claim');
            if (error) alert("Harvest failed: " + error.message);
            else location.reload();
        }

        async function stake() {
            const total = Number(profile.tokens) + Number(profile.staked_tokens);
            const { error } = await sb.from('profiles')
                .update({ 
                    staked_tokens: total, 
                    tokens: 0, 
                    last_sync_time: new Date().toISOString() 
                })
                .eq('id', profile.id);
            
            if (error) alert("Staking failed: " + error.message);
            else location.reload();
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            // Basic opacity toggle for nav
            event.currentTarget.parentElement.querySelectorAll('button').forEach(b => b.classList.add('opacity-40'));
            event.currentTarget.classList.remove('opacity-40');
        }

        window.onload = init;
    </script>
</body>
    </html>
