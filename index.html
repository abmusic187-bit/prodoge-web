<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRODOGE.BERT.COM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #F8F8F7; color: #000; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .active { display: block; }
        .nav-btn.active-tab { opacity: 1 !important; transform: scale(1.1); color: #2563eb; }
        #splash-loader, #tab-loader { transition: opacity 0.4s ease; }
        .pulse-logo { animation: pulse 1.5s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.95); } }
        .loader-spin { border: 2px solid #ccc; border-top: 2px solid #000; border-radius: 50%; width: 14px; height: 14px; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-32">

    <div id="splash-loader" class="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center">
        <h1 class="text-white text-4xl font-black italic pulse-logo tracking-tighter">PRODOGE</h1>
        <p class="text-blue-600 text-[8px] font-black tracking-[0.5em] mt-4 uppercase text-center">Elite P2P Network<br>Loading Assets...</p>
    </div>

    <div id="tab-loader" class="fixed inset-0 bg-[#F8F8F7]/80 backdrop-blur-md z-[60] hidden flex items-center justify-center">
        <div class="flex flex-col items-center">
            <div class="loader-spin !w-10 !h-10 !border-t-blue-600"></div>
            <p class="text-[8px] font-black uppercase mt-4 tracking-widest text-blue-600">Syncing Node...</p>
        </div>
    </div>

    <div id="auth-screen" class="fixed inset-0 bg-[#F8F8F7] z-50 p-6 overflow-y-auto hidden text-center">
        <div class="max-w-md mx-auto">
            <h1 class="text-5xl font-black mb-10 tracking-tighter italic">PRODOGE</h1>
            <div class="flex bg-white p-1 rounded-2xl mb-8 border border-gray-100 shadow-sm">
                <button onclick="toggleAuth('reg')" id="btn-reg" class="flex-1 py-4 font-black rounded-xl bg-black text-white">REGISTER</button>
                <button onclick="toggleAuth('log')" id="btn-log" class="flex-1 py-4 font-black text-gray-400">LOGIN</button>
            </div>
            <div class="space-y-4">
                <div id="reg-only" class="space-y-4">
                    <input type="text" id="username" placeholder="Username" class="w-full p-5 rounded-2xl border border-gray-100 outline-none font-bold">
                    <input type="password" id="sec-code" placeholder="Master Pin (Required)" class="w-full p-5 rounded-2xl border border-gray-100 outline-none font-bold text-center">
                </div>
                <input type="email" id="email" placeholder="Email" class="w-full p-5 rounded-2xl border border-gray-100 outline-none font-bold">
                <input type="password" id="password" placeholder="Password" class="w-full p-5 rounded-2xl border border-gray-100 outline-none font-bold">
                <button onclick="submitAuth(this)" class="w-full bg-black text-white p-6 rounded-[2.5rem] font-black text-xl shadow-2xl active:scale-95 transition uppercase">Connect Account</button>
            </div>
        </div>
    </div>

    <main class="pt-12 p-6 max-w-md mx-auto">
        
        <div id="dashboard" class="tab-content text-center">
            <div class="bg-white p-12 rounded-[4rem] shadow-sm border border-gray-100">
                <p class="text-gray-400 text-[10px] font-black uppercase mb-4 tracking-[0.4em]">Available Tokens</p>
                <h2 id="balance-display" class="text-8xl font-black mb-4 tracking-tighter">0</h2>
                <div class="bg-blue-600 text-white text-[10px] px-6 py-2 rounded-full font-black uppercase italic tracking-widest inline-block">Verified Elite</div>
            </div>
        </div>

        <div id="leaderboard" class="tab-content space-y-3">
            <h3 class="font-black text-2xl mb-6 italic px-2">Top Miners</h3>
            <div id="leaderboard-list"></div>
        </div>

        <div id="tasks" class="tab-content space-y-4">
            <h3 class="font-black text-2xl mb-6 italic px-2">Mining Hub</h3>
            <div class="bg-white p-6 rounded-[2.5rem] border border-gray-100 shadow-sm flex justify-between items-center">
                <div><p class="font-black text-sm uppercase italic">Daily Claim</p><p class="text-[10px] text-blue-600 font-black">+10 ELITE</p></div>
                <button id="claim-btn-daily" onclick="updateTokensDaily(10, this)" class="bg-black text-white px-8 py-3 rounded-2xl text-[10px] font-black disabled:opacity-20">CLAIM</button>
            </div>
            <div id="community-tasks" class="space-y-4"></div>
        </div>

        <div id="wallet" class="tab-content space-y-6">
            <div class="bg-white p-8 rounded-[3.5rem] border border-gray-100 shadow-sm text-center">
                <div class="w-20 h-20 bg-blue-600 rounded-full mx-auto mb-4 flex items-center justify-center text-white text-3xl font-black shadow-lg">
                    <span id="user-initial">P</span>
                </div>
                <h3 id="display-username" class="font-black text-2xl italic uppercase tracking-tighter">USER</h3>
                <p id="display-email" class="text-[9px] text-gray-400 font-bold mb-6">loading...</p>
                
                <div class="grid grid-cols-2 gap-3 mb-8">
                    <div class="bg-gray-50 p-4 rounded-3xl border border-gray-100">
                        <p class="text-[7px] font-black text-gray-400 uppercase">Status</p>
                        <p class="text-[10px] font-black text-blue-600">ELITE NODE</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-3xl border border-gray-100">
                        <p class="text-[7px] font-black text-gray-400 uppercase">Rank</p>
                        <p class="text-[10px] font-black">TOP TIERS</p>
                    </div>
                </div>

                <div class="space-y-4 text-left">
                    <label class="text-[9px] font-black uppercase ml-2 text-gray-400">P2P Wallet Address</label>
                    <input type="text" id="wallet-addr" placeholder="Address" class="w-full p-5 bg-gray-50 rounded-2xl outline-none font-mono text-center font-bold text-[10px] border border-gray-100">
                    <button onclick="saveWallet(this)" class="w-full bg-black text-white p-5 rounded-[2rem] font-black uppercase tracking-widest text-[9px]">Update Storage</button>
                </div>

                <hr class="my-8 border-gray-50">
                <button onclick="handleLogout()" class="w-full bg-red-50 text-red-500 p-5 rounded-[2rem] font-black uppercase tracking-widest text-[9px] border border-red-100">Log Out Session</button>
            </div>
        </div>

        <div id="create" class="tab-content">
            <div class="bg-white p-10 rounded-[3.5rem] border border-gray-100 shadow-sm space-y-6">
                <h3 class="font-black text-2xl mb-2 italic">Promote Profile</h3>
                <div class="space-y-4">
                    <select id="ad-type" onchange="calcAd()" class="w-full p-5 bg-gray-50 rounded-2xl outline-none font-black text-[11px] uppercase border border-gray-100">
                        <option value="30">YouTube Subscriber (Cost: 30)</option>
                        <option value="20">TikTok Follower (Cost: 20)</option>
                        <option value="20">Instagram Follower (Cost: 20)</option>
                    </select>
                    <input type="text" id="ad-url" placeholder="Social Link" class="w-full p-5 bg-gray-50 rounded-2xl outline-none font-bold border border-gray-100 text-xs">
                    <input type="number" id="ad-qty" oninput="calcAd()" placeholder="Quantity" class="w-full p-5 bg-gray-50 rounded-2xl outline-none font-bold border border-gray-100">
                    <div class="p-5 bg-blue-50 rounded-2xl flex justify-between items-center text-blue-600 font-black border border-blue-100 text-[10px]">
                        <span>DEDUCTION:</span> <span id="ad-cost" class="text-2xl">0</span>
                    </div>
                    <button onclick="deployAd(this)" class="w-full bg-black text-white p-6 rounded-[2.5rem] font-black shadow-2xl active:scale-95 transition uppercase text-xs">Deploy Mission</button>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-8 left-6 right-6 bg-white/95 backdrop-blur-2xl border border-gray-100 flex justify-around items-center py-4 rounded-[3rem] shadow-2xl z-20">
        <button onclick="showTab('dashboard')" class="nav-btn flex flex-col items-center gap-1"><span class="text-xl">🏠</span><span class="text-[8px] font-black">HOME</span></button>
        <button onclick="showTab('leaderboard')" class="nav-btn flex flex-col items-center gap-1 opacity-30"><span class="text-xl">🏆</span><span class="text-[8px] font-black">RANKS</span></button>
        <button onclick="showTab('tasks')" id="mine-btn-central" class="nav-btn -mt-12 bg-black text-white w-16 h-16 rounded-full flex flex-col items-center justify-center shadow-xl border-4 border-[#F8F8F7] active:scale-90 transition-all"><span class="text-2xl">💰</span><span class="text-[7px] font-black">MINE</span></button>
        <button onclick="showTab('wallet')" class="nav-btn flex flex-col items-center gap-1 opacity-30"><span class="text-xl">💳</span><span class="text-[8px] font-black">USER</span></button>
        <button onclick="showTab('create')" class="nav-btn flex flex-col items-center gap-1 opacity-30"><span class="text-xl">⚡</span><span class="text-[8px] font-black">ADS</span></button>
    </nav>

    <script>
        const SB_URL = "https://cnskfvzyfqovovhzkjcs.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuc2tmdnp5ZnFvdm92aHpramNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjYyNzgsImV4cCI6MjA5MDQ0MjI3OH0.l5FSXPHWqh5oXqF0mnxYrSQaqjrMlmiRgTk2es-e4Hc"; 
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let authMode = "reg";
        const MASTER_PIN = "eeusjdnbdgxg#)$kj6283928kshdgx";

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) { await loadProfile(session.user); } 
            else { document.getElementById('auth-screen').classList.remove('hidden'); }
            
            const savedTab = localStorage.getItem('activeTab') || 'dashboard';
            silentTabSwitch(savedTab);

            setTimeout(() => { 
                document.getElementById('splash-loader').style.opacity = '0'; 
                setTimeout(() => document.getElementById('splash-loader').classList.add('hidden'), 500); 
            }, 1200);
        };

        async function loadProfile(user) {
            const { data } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
            if(data) {
                currentUser = data;
                document.getElementById('balance-display').innerText = data.tokens;
                document.getElementById('display-username').innerText = data.username || "Anonymous User";
                document.getElementById('display-email').innerText = user.email;
                document.getElementById('user-initial').innerText = (data.username || "P").charAt(0).toUpperCase();
                document.getElementById('wallet-addr').value = data.wallet_address || "";
                document.getElementById('auth-screen').classList.add('hidden');
                checkDaily();
                loadCommunityTasks();
                loadLeaderboard();
            }
        }

        function showTab(id) {
            const loader = document.getElementById('tab-loader');
            loader.classList.remove('hidden');
            setTimeout(() => {
                silentTabSwitch(id);
                setTimeout(() => { loader.classList.add('hidden'); }, 300);
            }, 250);
        }

        function silentTabSwitch(id) {
            localStorage.setItem('activeTab', id);
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');

            document.querySelectorAll('.nav-btn').forEach(b => { 
                b.classList.add('opacity-30'); 
                b.classList.remove('active-tab');
                if(b.id === 'mine-btn-central') {
                    b.classList.remove('opacity-30');
                    b.classList.add('bg-black');
                    b.classList.remove('bg-blue-600');
                }
            });

            const btns = document.querySelectorAll('.nav-btn');
            btns.forEach(btn => {
                if(btn.getAttribute('onclick').includes(`'${id}'`)) {
                    btn.classList.remove('opacity-30');
                    btn.classList.add('active-tab');
                    if(btn.id === 'mine-btn-central') {
                        btn.classList.add('bg-blue-600');
                        btn.classList.remove('bg-black');
                    }
                }
            });
        }

        async function loadCommunityTasks() {
            const { data } = await supabaseClient.from('user_tasks').select('*').gt('remaining', 0).order('created_at', {ascending: false});
            if (data) {
                const container = document.getElementById('community-tasks');
                if (data.length === 0) {
                    container.innerHTML = `<p class="text-center opacity-20 py-10 font-black text-[10px]">NO MISSIONS FOUND</p>`;
                    return;
                }
                container.innerHTML = data.map(task => `
                    <div class="bg-white p-6 rounded-[2.5rem] border border-gray-100 shadow-sm space-y-4">
                        <div class="flex justify-between items-center">
                            <div><p class="font-black text-sm italic uppercase">${task.type} Mission</p><p class="text-[9px] text-gray-400 font-black uppercase">REMAINING: ${task.remaining}</p></div>
                            <span class="text-xs font-black text-blue-600 uppercase">+${task.reward}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="window.open('${task.url}', '_blank'); document.getElementById('claim-${task.id}').disabled=false" class="flex-1 bg-gray-50 py-4 rounded-2xl text-[10px] font-black uppercase italic">Visit</button>
                            <button id="claim-${task.id}" onclick="completeTask('${task.id}', this)" disabled class="flex-1 bg-black text-white py-4 rounded-2xl text-[10px] font-black uppercase italic disabled:opacity-10">Claim</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        async function completeTask(taskId, btn) {
            btn.innerHTML = '<div class="loader-spin"></div>';
            const { data, error } = await supabaseClient.rpc('complete_task_secure', { target_task_id: taskId });
            if(error) { alert(error.message); btn.innerText = "FAILED"; }
            else {
                currentUser.tokens = data.new_balance;
                document.getElementById('balance-display').innerText = data.new_balance;
                btn.innerText = "VERIFIED";
                btn.disabled = true;
            }
        }

        function calcAd() {
            const price = parseInt(document.getElementById('ad-type').value);
            const qty = parseInt(document.getElementById('ad-qty').value) || 0;
            document.getElementById('ad-cost').innerText = (price * qty);
        }

        async function deployAd(btn) {
            const cost = parseInt(document.getElementById('ad-cost').innerText);
            const url = document.getElementById('ad-url').value;
            const typeText = document.getElementById('ad-type').options[document.getElementById('ad-type').selectedIndex].text.split(' (')[0];
            const rewardAmt = parseInt(document.getElementById('ad-type').value);

            if(currentUser.tokens < cost || !url || cost <= 0) return alert("Verify URL and Balance");

            btn.innerHTML = '<div class="loader-spin"></div>';
            await supabaseClient.from('profiles').update({ tokens: currentUser.tokens - cost }).eq('id', currentUser.id);
            await supabaseClient.from('user_tasks').insert({ creator_id: currentUser.id, type: typeText, url: url, reward: rewardAmt, remaining: parseInt(document.getElementById('ad-qty').value) });
            alert("Mission Deployed!");
            location.reload();
        }

        async function submitAuth(btn) {
            const user = document.getElementById('username').value;
            const pin = document.getElementById('sec-code').value;
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            if(authMode === 'reg' && pin !== MASTER_PIN) return alert("Invalid Master Pin");

            const { data, error } = authMode === 'reg' ? 
                await supabaseClient.auth.signUp({ email, password: pass, options: { data: { username: user } } }) :
                await supabaseClient.auth.signInWithPassword({ email, password: pass });
            
            if(!error) loadProfile(data.user); else alert(error.message);
        }

        async function updateTokensDaily(amt, btn) {
            btn.innerHTML = '<div class="loader-spin"></div>';
            localStorage.setItem('claim_' + currentUser.id, new Date().toISOString());
            const newTotal = parseInt(currentUser.tokens) + amt;
            await supabaseClient.from('profiles').update({ tokens: newTotal }).eq('id', currentUser.id);
            currentUser.tokens = newTotal;
            document.getElementById('balance-display').innerText = newTotal;
            checkDaily();
        }

        function checkDaily() {
            const last = localStorage.getItem('claim_' + currentUser.id);
            if (last) {
                const hours = (new Date() - new Date(last)) / 36e5;
                if (hours < 24) { 
                    const btn = document.getElementById('claim-btn-daily');
                    if(btn) { btn.disabled = true; btn.innerText = "DONE"; }
                }
            }
        }

        async function loadLeaderboard() {
            const { data } = await supabaseClient.from('profiles').select('username, tokens').order('tokens', { ascending: false }).limit(5);
            if (data) document.getElementById('leaderboard-list').innerHTML = data.map((u, i) => `<div class="bg-white p-5 rounded-3xl flex justify-between border border-gray-50 mb-2 font-black italic text-xs uppercase shadow-sm"><span>#${i+1} ${u.username}</span><span class="text-blue-600">${u.tokens}</span></div>`).join('');
        }

        function toggleAuth(mode) {
            authMode = mode;
            document.getElementById('reg-only').style.display = mode === 'reg' ? 'block' : 'none';
        }

        async function handleLogout() { localStorage.clear(); await supabaseClient.auth.signOut(); location.reload(); }
        async function saveWallet(btn) { btn.innerHTML = '<div class="loader-spin"></div>'; await supabaseClient.from('profiles').update({ wallet_address: document.getElementById('wall
