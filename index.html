<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRODOGE - ELITE TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00F9FF; --admin: #7000FF; --surface: #001A24; }
        body { 
            background: #000D12; color: #E0F2F1; font-family: 'Chakra Petch', sans-serif; overflow-x: hidden;
            background-image: radial-gradient(circle at top right, rgba(0, 249, 255, 0.05) 0%, transparent 40%);
        }

        /* --- PROFESSIONAL UI COMPONENTS --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px;
        }

        .pd-logo-pro {
            width: 70px; height: 70px; display: flex; align-items: center; justify-content: center;
            background: var(--surface); border: 2px solid var(--neon); border-radius: 16px;
            font-weight: 900; font-size: 28px; color: var(--neon);
            box-shadow: 0 8px 32px rgba(0, 249, 255, 0.15);
        }

        /* Rank Colors */
        .rank-E { color: #94a3b8; border-color: #94a3b8; }
        .rank-D { color: #4ade80; border-color: #4ade80; }
        .rank-C { color: #60a5fa; border-color: #60a5fa; }
        .rank-B { color: #a78bfa; border-color: #a78bfa; }
        .rank-A { color: #fbbf24; border-color: #fbbf24; }
        .rank-S { color: #f87171; border-color: #f87171; text-shadow: 0 0 10px rgba(248,113,113,0.5); }

        /* XP Bar */
        .xp-container { width: 100%; background: rgba(255,255,255,0.05); border-radius: 10px; height: 6px; overflow: hidden; }
        .xp-bar { height: 100%; background: linear-gradient(90deg, #00F9FF, #7000FF); transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* Mining Orbit */
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .orbit-container { 
            position: relative; width: 180px; height: 180px; margin: 0 auto;
            border: 2px solid rgba(0, 249, 255, 0.05); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .orbit-ring {
            position: absolute; inset: -10px; border: 1px dashed rgba(0, 249, 255, 0.2);
            border-radius: 50%; animation: rotate 12s linear infinite;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .pro-btn { transition: all 0.2s; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .pro-btn:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body class="pb-32">

    <div id="splash-screen" class="fixed inset-0 z-[9999] bg-[#000D12] flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="pd-logo-pro mb-6">PD</div>
        <div class="w-32 h-1 xp-container">
            <div class="xp-bar animate-[loading_2s_infinite]" style="width: 50%"></div>
        </div>
    </div>

    <div id="auth-screen" class="fixed inset-0 z-[1000] bg-[#000D12] flex flex-col items-center justify-center p-8 hidden">
        <div class="pd-logo-pro mb-10 scale-125">PD</div>
        <h2 class="text-3xl font-black mb-12 tracking-tighter">PRODOGE_SYSTEM</h2>
        <button onclick="login()" class="w-full max-w-xs bg-white text-black py-5 rounded-2xl font-black uppercase text-sm shadow-xl">Initialize Neural Link</button>
    </div>

    <header class="p-5 fixed top-0 inset-x-0 z-50 bg-[#000D12]/80 backdrop-blur-xl border-b border-white/5">
        <div class="flex justify-between items-end mb-4">
            <div class="flex items-center gap-4">
                <div class="pd-logo-pro !w-12 !h-12 !text-sm">PD</div>
                <div>
                    <div class="flex items-center gap-2">
                        <p id="user-display-id" class="font-black text-sm uppercase tracking-tight">AGENT_ID</p>
                        <span id="header-rank" class="text-[9px] font-black border px-2 py-0.5 rounded uppercase">Rank E</span>
                    </div>
                    <p id="header-level" class="text-[10px] opacity-50 font-bold">LEVEL 1</p>
                </div>
            </div>
            <div class="text-right">
                <p id="bal" class="text-2xl font-black text-[#00F9FF]">0.00</p>
                <p class="text-[9px] font-black opacity-40 uppercase tracking-widest">Elite Credits</p>
            </div>
        </div>
        <div class="xp-container"><div id="header-xp-bar" class="xp-bar" style="width: 0%"></div></div>
    </header>

    <main class="pt-36 px-6 max-w-md mx-auto space-y-6">

        <div id="tab-home" class="tab-content active">
            <div class="glass-card p-8 text-center">
                <div class="orbit-container mb-8">
                    <div class="orbit-ring"></div>
                    <div>
                        <p class="text-[10px] opacity-40 uppercase font-black mb-1">Current Yield</p>
                        <h3 id="yield" class="text-3xl font-black text-[#00F9FF] tracking-tight">0.000000</h3>
                    </div>
                </div>
                <div class="mb-10">
                    <p id="staked" class="text-xs font-black opacity-60 uppercase tracking-widest mb-4">0.00 Staked</p>
                    <div class="grid grid-cols-2 gap-4">
                        <button id="stake-btn" onclick="handleStakeToggle()" class="pro-btn bg-[#00F9FF] text-black h-14 rounded-2xl text-xs">Stake All</button>
                        <button onclick="harvest()" class="pro-btn border-2 border-white/10 h-14 rounded-2xl text-xs">Harvest</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-events" class="tab-content">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-black uppercase italic">Mega Week</h2>
                <span class="bg-red-500 text-white text-[9px] px-2 py-1 rounded-full font-black animate-pulse">LIVE</span>
            </div>
            <div class="glass-card p-2 space-y-2" id="leaderboard-list">
                </div>
        </div>

        <div id="tab-tasks" class="tab-content">
            <h2 class="text-2xl font-black uppercase mb-6 italic">Missions</h2>
            <div id="task-list" class="space-y-4"></div>
        </div>

        <div id="tab-deposit" class="tab-content">
            <h2 class="text-2xl font-black uppercase mb-6 italic">Vault</h2>
            <div class="glass-card p-6 space-y-4">
                <div class="p-5 rounded-2xl bg-white/5 border border-white/5 flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-black opacity-50 uppercase">Starter Pack</p>
                        <h4 class="font-black text-lg text-white">1,000 ELITE</h4>
                    </div>
                    <button onclick="alert('Contact admin for 100 PKR Deposit')" class="bg-green-500 pro-btn px-6 py-3 rounded-xl text-[10px] font-black">100 PKR</button>
                </div>
                <p class="text-[10px] text-center opacity-30 italic">Deposits trigger hidden rank evaluation.</p>
            </div>
        </div>

        <div id="tab-profile" class="tab-content space-y-4">
            <div class="glass-card p-6 flex items-center gap-5">
                <img id="p-avatar" class="w-20 h-20 rounded-2xl border-2 border-white/10 bg-black/40">
                <div class="flex-1">
                    <h4 id="p-username" class="text-xl font-black uppercase tracking-tighter">AGENT</h4>
                    <p id="p-full-level" class="text-[10px] font-bold opacity-50 mb-2 uppercase">Level 1</p>
                    <div class="xp-container h-2"><div id="profile-xp-bar" class="xp-bar"></div></div>
                </div>
            </div>
            <div class="glass-card p-6 text-center">
                <p class="text-[10px] font-black opacity-40 uppercase mb-1">System Rank</p>
                <h3 id="p-rank-display" class="text-5xl font-black italic">E</h3>
            </div>
            <div class="glass-card p-6 space-y-3">
                <input type="text" id="new-name-input" placeholder="Change Alias" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl outline-none text-sm focus:border-[#00F9FF]">
                <button onclick="updateName()" class="w-full bg-[#00F9FF] text-black py-4 rounded-xl font-black text-xs pro-btn">Update Profile</button>
            </div>
            <button onclick="sb.auth.signOut().then(() => location.reload())" class="w-full text-red-500 font-black text-[10px] uppercase py-4">Terminate Link</button>
        </div>

        <div id="tab-admin" class="tab-content">
            <h2 class="text-2xl font-black uppercase mb-6 italic text-[#7000FF]">Root</h2>
            <div class="glass-card p-6 space-y-3 border-[#7000FF]/20">
                <input type="text" id="admin-dep-user" placeholder="Username" class="w-full bg-black border border-white/10 p-4 rounded-xl outline-none text-sm">
                <input type="number" id="admin-dep-pkr" placeholder="PKR Amount" class="w-full bg-black border border-white/10 p-4 rounded-xl outline-none text-sm">
                <button onclick="adminProcessDeposit()" class="w-full bg-[#7000FF] text-white py-4 rounded-xl font-black text-xs pro-btn">Confirm Deposit</button>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-6 inset-x-6 h-20 glass-card flex justify-around items-center px-4 border-white/10 shadow-2xl z-50">
        <button onclick="showTab('home', event)" class="nav-btn text-2xl text-[#00F9FF]">🏠</button>
        <button onclick="showTab('events', event)" class="nav-btn text-2xl opacity-40">🏆</button>
        <button onclick="showTab('tasks', event)" class="nav-btn text-2xl opacity-40">🛰️</button>
        <button onclick="showTab('deposit', event)" class="nav-btn text-2xl opacity-40">💎</button>
        <button onclick="showTab('profile', event)" class="nav-btn text-2xl opacity-40">👤</button>
        <button id="admin-nav" onclick="showTab('admin', event)" class="nav-btn text-2xl opacity-40 hidden">⚙️</button>
    </nav>

    <script>
        const SB_URL = "https://htngfzwclkqsffozxfuo.supabase.co";
        const SB_KEY = "sb_publishable_2LJdcMlfhcEyNl_EMUx-2w_Ms5ZtJ5g";
        const sb = supabase.createClient(SB_URL, SB_KEY);
        let profile = null;

        async function login() { await sb.auth.signInWithOAuth({ provider: 'google' }); }

        function calculateLevelInfo(xp) {
            const val = Number(xp) || 0;
            let level = Math.floor(Math.sqrt(val / 50)) + 1;
            if (level > 100) level = 100;
            const currentLvlXp = 50 * Math.pow(level - 1, 2);
            const nextLvlXp = 50 * Math.pow(level, 2);
            const progress = level >= 100 ? 100 : ((val - currentLvlXp) / (nextLvlXp - currentLvlXp)) * 100;
            return { level, progress, val, nextLvlXp };
        }

        function calculateRank(dep) {
            const d = Number(dep) || 0;
            if (d >= 1000000) return 'S';
            if (d >= 500000) return 'A';
            if (d >= 100000) return 'B';
            if (d >= 10000) return 'C';
            if (d >= 200) return 'D';
            return 'E';
        }

        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                const { data } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
                if (data) {
                    profile = data; 
                    render(); loadTasks(); loadLeaderboard(); updateButtonUI();
                    setInterval(updateMining, 1000);
                    if (session.user.email === "sa7530006@gmail.com") document.getElementById('admin-nav').classList.remove('hidden');
                }
            } else { document.getElementById('auth-screen').classList.remove('hidden'); }
            setTimeout(() => document.getElementById('splash-screen').style.opacity = '0', 1000);
            setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 1700);
        }

        function render() {
            const rank = calculateRank(profile.total_deposits);
            const l = calculateLevelInfo(profile.xp);
            const name = profile.username || "AGENT_" + profile.id.slice(0,4);
            
            document.getElementById('user-display-id').innerText = name;
            document.getElementById('header-rank').innerText = "Rank " + rank;
            document.getElementById('header-rank').className = `text-[9px] font-black border px-2 py-0.5 rounded uppercase rank-${rank}`;
            document.getElementById('header-level').innerText = "LEVEL " + l.level;
            document.getElementById('header-xp-bar').style.width = l.progress + "%";
            document.getElementById('bal').innerText = Number(profile.tokens).toLocaleString();
            document.getElementById('staked').innerText = Number(profile.staked_tokens).toLocaleString() + " STAKED";
            
            document.getElementById('p-username').innerText = name;
            document.getElementById('p-avatar').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${profile.id}`;
            document.getElementById('p-full-level').innerText = `Level ${l.level} — ${l.val}/${l.nextLvlXp} XP`;
            document.getElementById('profile-xp-bar').style.width = l.progress + "%";
            document.getElementById('p-rank-display').innerText = rank;
            document.getElementById('p-rank-display').className = `text-5xl font-black italic rank-${rank}`;
        }

        async function loadTasks() {
            const { data } = await sb.from('tiktok_tasks1').select('*');
            const completed = (profile.completed_tasks || "").split(',').filter(x=>x);
            if (data) {
                const list = data.filter(t => !completed.includes(String(t.id)));
                document.getElementById('task-list').innerHTML = list.length ? list.map(t => `
                    <div class="glass-card p-5 flex justify-between items-center">
                        <div>
                            <p class="text-xs font-black uppercase tracking-tight">${t.description}</p>
                            <p class="text-[10px] text-[#00F9FF] font-black mt-1">+${t.reward} ELITE | +50 XP</p>
                        </div>
                        <button onclick="runTask('${t.link}', ${t.reward}, ${t.id})" class="bg-[#00F9FF] text-black px-4 py-2 rounded-lg text-[10px] font-black uppercase">Start</button>
                    </div>`).join('') : "<p class='text-center opacity-30 text-xs py-10'>ALL MISSIONS CLEARED</p>";
            }
        }

        function runTask(link, rew, id) {
            window.open(link, '_blank');
            document.getElementById('task-list').innerHTML = `
                <div class="glass-card p-10 text-center animate-pulse">
                    <p class="text-xs font-black uppercase text-[#00F9FF] mb-4">Verifying Mission...</p>
                    <button onclick="claim(${rew}, ${id})" class="bg-[#00F9FF] text-black px-8 py-3 rounded-xl font-black text-xs">Claim Reward</button>
                </div>`;
        }

        async function claim(rew, id) {
            let done = (profile.completed_tasks || "").split(',').filter(x=>x);
            done.push(String(id));
            await sb.from('profiles').update({ 
                tokens: Number(profile.tokens) + rew, 
                xp: (profile.xp || 0) + 50, 
                completed_tasks: done.join(',') 
            }).eq('id', profile.id);
            location.reload();
        }

        async function loadLeaderboard() {
            const { data } = await sb.from('profiles').select('username, total_deposits, id, xp').order('total_deposits', { ascending: false }).limit(10);
            if(data) {
                document.getElementById('leaderboard-list').innerHTML = data.map((u, i) => {
                    const r = calculateRank(u.total_deposits);
                    return `
                    <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl">
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] font-black opacity-20">${i+1}</span>
                            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${u.id}" class="w-8 h-8 rounded-lg bg-black">
                            <p class="text-xs font-black uppercase">${u.username || 'Agent'}</p>
                        </div>
                        <p class="text-sm font-black rank-${r}">${r}</p>
                    </div>`;
                }).join('');
            }
        }

        function updateButtonUI() {
            const btn = document.getElementById('stake-btn');
            const isStaked = Number(profile.staked_tokens) > 0;
            btn.innerText = isStaked ? "Unstake All" : "Stake All";
            btn.style.backgroundColor = isStaked ? "#f97316" : "#00F9FF";
        }

        async function handleStakeToggle() {
            const isStaked = Number(profile.staked_tokens) > 0;
            if (isStaked) {
                await sb.from('profiles').update({ tokens: Number(profile.tokens) + Number(profile.staked_tokens), staked_tokens: 0 }).eq('id', profile.id);
            } else {
                if (profile.tokens <= 0) return alert("Insufficient Balance");
                await sb.from('profiles').update({ staked_tokens: profile.tokens, tokens: 0, last_sync_time: new Date().toISOString() }).eq('id', profile.id);
            }
            location.reload();
        }

        async function adminProcessDeposit() {
            const uname = document.getElementById('admin-dep-user').value;
            const pkr = Number(document.getElementById('admin-dep-pkr').value);
            const { data: user } = await sb.from('profiles').select('*').eq('username', uname).single();
            if(user) {
                await sb.from('profiles').update({ 
                    total_deposits: (user.total_deposits || 0) + pkr,
                    tokens: Number(user.tokens) + (pkr * 10) 
                }).eq('id', user.id);
                alert("Deposit Logged.");
            }
        }

        async function updateName() {
            const n = document.getElementById('new-name-input').value.trim();
            if(n) { await sb.from('profiles').update({ username: n }).eq('id', profile.id); location.reload(); }
        }

        function updateMining() {
            if (!profile?.staked_tokens) return;
            const diff = (new Date() - new Date(profile.last_sync_time)) / 1000;
            const earned = (profile.staked_tokens * 0.04 * diff) / 86400;
            document.getElementById('yield').innerText = earned.toFixed(6);
        }

        async function harvest() { await sb.rpc('process_mining_claim'); location.reload(); }

        function showTab(id, e) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => { b.classList.add('opacity-40'); b.classList.remove('text-[#00F9FF]'); });
            e.currentTarget.classList.remove('opacity-40'); e.currentT
