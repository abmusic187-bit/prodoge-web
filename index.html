<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRODOGE ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #F9FAFB; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        #verify-modal { display: none; background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); z-index: 1000; }
        .scan-line { height: 2px; background: #2563eb; width: 100%; position: absolute; box-shadow: 0 0 15px #2563eb; animation: scan 2s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .card { background: white; border-radius: 2rem; border: 1px solid #edf2f7; padding: 1.5rem; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #2563eb; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-32">

    <div id="verify-modal" class="fixed inset-0 flex flex-col items-center justify-center p-8 text-center">
        <div class="relative w-64 h-40 bg-gray-900 rounded-3xl overflow-hidden mb-6 border-4 border-white shadow-2xl">
            <div class="scan-line"></div>
            <div class="h-full flex flex-col items-center justify-center space-y-2">
                <div class="loader"></div>
                <p id="scan-status" class="text-blue-400 font-mono text-[10px] uppercase">Waiting for Return...</p>
            </div>
        </div>
        <h2 class="font-black text-xl uppercase italic">Verifying Task</h2>
        <p class="text-gray-400 text-[10px] font-bold mt-2 uppercase">Account: <span id="active-handle" class="text-blue-600">...</span></p>
        <div class="w-full max-w-xs bg-gray-100 h-1.5 rounded-full mt-8 overflow-hidden"><div id="scan-progress" class="bg-blue-600 h-full w-0 transition-all duration-500"></div></div>
        <button id="claim-btn" disabled onclick="finalClaim()" class="mt-8 w-full max-w-xs bg-blue-600 text-white p-5 rounded-2xl font-black uppercase text-xs opacity-20">Analyzing Interaction...</button>
        <button onclick="location.reload()" class="mt-4 text-[10px] font-black text-gray-400 uppercase">Cancel & Refresh</button>
    </div>

    <div class="p-6 flex justify-between items-center sticky top-0 bg-white/80 backdrop-blur-md z-40 border-b">
        <h1 class="font-black text-2xl italic tracking-tighter">PRODOGE</h1>
        <div class="bg-black text-white px-5 py-2 rounded-2xl flex items-center gap-2">
            <span id="balance" class="font-black text-lg">0</span>
        </div>
    </div>

    <main class="p-6 max-w-md mx-auto space-y-8">
        <section class="card space-y-4">
            <h3 class="font-black text-xs uppercase text-gray-400">1. Link Your Social Account</h3>
            <div id="linked-badges" class="flex flex-wrap gap-2"></div>
            <div class="flex gap-2">
                <select id="bind-platform" class="bg-gray-50 border rounded-xl p-3 text-[10px] font-black outline-none">
                    <option value="youtube">YouTube</option>
                    <option value="tiktok">TikTok</option>
                </select>
                <input type="text" id="bind-handle" placeholder="@username" class="flex-1 bg-gray-50 border rounded-xl p-3 text-[10px] font-bold outline-none">
                <button onclick="bindSocial()" class="bg-black text-white px-4 rounded-xl text-[10px] font-black uppercase">Link</button>
            </div>
        </section>

        <section class="space-y-4">
            <h3 class="font-black text-2xl italic">2. Earn Tokens</h3>
            <div id="mission-list" class="space-y-3"></div>
        </section>
    </main>

    <script>
        const SB_URL = "https://cnskfvzyfqovovhzkjcs.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuc2tmdnp5ZnFvdm92aHpramNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjYyNzgsImV4cCI6MjA5MDQ0MjI3OH0.l5FSXPHWqh5oXqF0mnxYrSQaqjrMlmiRgTk2es-e4Hc"; 
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        let user = null;
        let activeTaskId = null;
        let activePlatform = null;
        let linkedAccounts = {};

        window.onload = async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                const profile = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
                user = profile.data;
                document.getElementById('balance').innerText = user.tokens;
                await fetchLinks();
                loadMissions();
            }
        };

        async function fetchLinks() {
            const { data } = await supabase.from('linked_socials').select('*').eq('user_id', user.id);
            const badgeContainer = document.getElementById('linked-badges');
            badgeContainer.innerHTML = ''; linkedAccounts = {};
            if(data) {
                data.forEach(link => {
                    linkedAccounts[link.platform.toLowerCase()] = link.handle;
                    badgeContainer.innerHTML += `<span class="bg-blue-600 text-white text-[8px] font-black px-3 py-1 rounded-full uppercase">${link.platform}: ${link.handle}</span>`;
                });
            }
        }

        async function bindSocial() {
            const platform = document.getElementById('bind-platform').value.toLowerCase();
            const handle = document.getElementById('bind-handle').value.trim();
            if(!handle) return alert("Enter handle!");
            const { error } = await supabase.from('linked_socials').insert({ user_id: user.id, platform, handle });
            if(error) alert("Already linked or error."); else { alert("Linked!"); await fetchLinks(); }
        }

        async function loadMissions() {
            const { data } = await supabase.from('available_tasks').select('*');
            const container = document.getElementById('mission-list');
            if(!data || data.length === 0) { container.innerHTML = '<p class="text-center opacity-30 text-xs font-black">NO MISSIONS AVAILABLE</p>'; return; }
            container.innerHTML = data.map(t => {
                const platform = t.type.toLowerCase().includes('youtube') ? 'youtube' : 'tiktok';
                return `
                <div class="card flex justify-between items-center shadow-sm">
                    <div><p class="text-[9px] font-black text-blue-600 uppercase">${t.type}</p><p class="font-black text-lg">+${t.reward}</p></div>
                    <button onclick="startTask('${t.id}', '${t.url}', '${platform}')" class="bg-black text-white px-6 py-3 rounded-2xl font-black text-[10px] uppercase">DO TASK</button>
                </div>`;
            }).join('');
        }

        function startTask(id, url, platform) {
            if(!linkedAccounts[platform]) return alert(`Link your ${platform} first!`);
            activeTaskId = id; activePlatform = platform;
            document.getElementById('active-handle').innerText = linkedAccounts[platform];
            window.open(url, '_blank');
            document.getElementById('verify-modal').style.display = 'flex';
            
            const onReturn = () => {
                if (document.visibilityState === 'visible') {
                    runReader(); document.removeEventListener('visibilitychange', onReturn);
                }
            };
            document.addEventListener('visibilitychange', onReturn);
        }

        function runReader() {
            let p = 0; const bar = document.getElementById('scan-progress'); const status = document.getElementById('scan-status');
            const timer = setInterval(() => {
                p += 25; bar.style.width = p + '%';
                if(p === 50) status.innerText = "Accessing Profile Log...";
                if(p === 100) {
                    clearInterval(timer); status.innerText = "MATCH CONFIRMED";
                    document.getElementById('claim-btn').disabled = false;
                    document.getElementById('claim-btn').classList.remove('opacity-20');
                    document.getElementById('claim-btn').innerText = "COLLECT REWARD";
                }
            }, 1000);
        }

        async function finalClaim() {
            const { data, error } = await supabase.rpc('verify_with_social_link', {
                target_task_id: activeTaskId, platform_type: activePlatform
            });
            if(error) { alert(error.message); location.reload(); }
            else { alert("Tokens Added!"); location.reload(); }
        }
    </script>
</body>
            </html>
