<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PRODOGE NETWORK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #F8F8F7; color: #000; font-family: sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; overflow-x: hidden; }
        .tab-content { display: none; }
        .active { display: block; }
        #splash-loader { transition: opacity 0.5s ease, visibility 0.5s; }
        .pulse-logo { animation: pulse 1.5s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.95); } }
        .spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* Modal & Animations */
        #bonus-modal { backdrop-filter: blur(12px); display: none; transition: all 0.5s ease; }
        .gold-glow { box-shadow: 0 20px 50px rgba(234, 179, 8, 0.3); }
        .animate-bounce-slow { animation: bounce 3s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body class="pb-40">

    <div id="splash-loader" class="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center">
        <h1 class="text-white text-4xl font-black italic pulse-logo tracking-tighter">PRODOGE</h1>
        <p class="text-blue-600 text-[8px] font-black tracking-[0.5em] mt-4 uppercase italic">Establishing Secure Node...</p>
    </div>

    <div id="bonus-modal" class="fixed inset-0 z-[70] flex items-center justify-center p-6 bg-black/40">
        <div class="bg-white rounded-[3.5rem] p-10 w-full max-w-xs text-center border-4 border-yellow-400 gold-glow relative scale-100 animate-in fade-in zoom-in duration-300">
            <div class="text-7xl mb-6 animate-bounce-slow">🎁</div>
            <h2 class="text-2xl font-black italic uppercase leading-none">New Member<br>Bonus!</h2>
            <p class="text-blue-600 font-bold text-[9px] tracking-widest uppercase mt-4">Congratulations</p>
            
            <div class="my-8 bg-gray-50 py-8 rounded-[2.5rem] border-2 border-dashed border-gray-200">
                <h1 class="text-6xl font-black text-black">100</h1>
                <p class="font-black text-[10px] text-gray-400 uppercase tracking-widest">Elite Tokens</p>
            </div>

            <button onclick="executeClaimBonus(this)" class="w-full bg-black text-white p-6 rounded-[2rem] font-black uppercase text-xs shadow-2xl active:scale-95 transition-all">
                Claim Reward
            </button>
        </div>
    </div>

    <header class="fixed top-0 left-0 right-0 z-40 p-6 flex justify-between items-start pointer-events-none">
        <div class="pointer-events-auto">
            <h1 class="text-2xl font-black italic tracking-tighter text-black">PRODOGE</h1>
            <div class="h-1 w-10 bg-blue-600 rounded-full mt-[-2px]"></div>
        </div>

        <div class="absolute left-1/2 -translate-x-1/2 pointer-events-auto">
            <div class="bg-black text-white px-5 py-2 rounded-2xl shadow-xl flex flex-col items-center min-w-[130px] border-b-4 border-blue-600">
                <span class="text-[7px] font-black tracking-widest text-blue-400 uppercase">Live Yield</span>
                <span id="live-mining-counter" class="text-xs font-mono font-bold tracking-tighter">0.000000</span>
            </div>
        </div>

        <div class="bg-white/90 backdrop-blur-md border border-gray-100 px-4 py-2 rounded-xl shadow-sm pointer-events-auto">
            <span id="balance-display" class="text-lg font-black tracking-tighter">0.00</span>
            <span class="text-[8px] font-black text-blue-600 ml-1">ELITE</span>
        </div>
    </header>

    <div id="auth-screen" class="fixed inset-0 bg-[#F8F8F7] z-50 p-8 hidden text-center overflow-y-auto">
        <div class="max-w-md mx-auto pt-20">
            <h1 class="text-6xl font-black mb-12 italic tracking-tighter">PRODOGE</h1>
            <div class="flex bg-white p-1 rounded-[2rem] mb-10 border shadow-sm">
                <button onclick="toggleAuth('reg')" id="btn-reg" class="flex-1 py-5 font-black rounded-[1.8rem] bg-black text-white transition-all">SIGN UP</button>
                <button onclick="toggleAuth('log')" id="btn-log" class="flex-1 py-5 font-black text-gray-400 transition-all">LOG IN</button>
            </div>
            <div class="space-y-4">
                <div id="reg-only" class="space-y-4">
                    <input type="text" id="username" placeholder="Choose Username" class="w-full p-6 rounded-[2rem] border-2 border-transparent focus:border-blue-600 bg-white outline-none font-bold">
                    <input type="password" id="sec-code" placeholder="Master Access Pin" class="w-full p-6 rounded-[2rem] border-2 border-transparent focus:border-blue-600 bg-white outline-none font-bold text-center">
                </div>
                <input type="email" id="email" placeholder="Email Address" class="w-full p-6 rounded-[2rem] border-2 border-transparent focus:border-blue-600 bg-white outline-none font-bold">
                <input type="password" id="password" placeholder="Password" class="w-full p-6 rounded-[2rem] border-2 border-transparent focus:border-blue-600 bg-white outline-none font-bold">
                <button onclick="submitAuth(this)" class="w-full bg-black text-white p-7 rounded-[2.5rem] font-black uppercase text-sm shadow-xl mt-4">Enter Network</button>
            </div>
        </div>
    </div>

    <main class="pt-32 p-6 max-w-md mx-auto">
        <div id="dashboard" class="tab-content active text-center">
            <div class="bg-white p-12 rounded-[4rem] border border-gray-100 shadow-sm mb-8 relative overflow-hidden">
                <div class="relative w-56 h-56 mx-auto mb-10">
                    <div class="absolute inset-0 rounded-full border-[6px] border-dashed border-blue-600/10 spin-slow"></div>
                    <div class="absolute inset-6 bg-gray-50 rounded-full flex flex-col items-center justify-center border-2 shadow-inner">
                        <span class="text-4xl animate-pulse">💎</span>
                        <p class="text-[8px] font-black text-blue-600 mt-3 tracking-[0.4em] uppercase italic">Machine Core</p>
                        <h2 id="live-yield-main" class="text-3xl font-black mt-1">+0.000000</h2>
                    </div>
                </div>
                <div class="space-y-1">
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest italic">Current Stake</p>
                    <div class="flex justify-center items-baseline gap-1">
                        <span id="staked-display" class="text-5xl font-black tracking-tighter">0</span>
                        <span class="text-sm font-bold text-blue-600 italic uppercase">Elite</span>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="startMining()" class="bg-black text-white p-6 rounded-[2.2rem] font-black uppercase text-[10px] shadow-xl">Start Engine</button>
                <button onclick="unlockMining()" class="bg-white text-blue-600 p-6 rounded-[2.2rem] font-black uppercase text-[10px] border-2 border-blue-50 shadow-sm">Harvest</button>
            </div>
        </div>

        <div id="leaderboard" class="tab-content space-y-6">
            <h3 class="font-black text-3xl italic px-2 uppercase tracking-tighter">Elite Ranks</h3>
            <div id="leaderboard-list" class="space-y-3"></div>
        </div>

        <div id="tasks" class="tab-content space-y-6">
            <h3 class="font-black text-3xl italic px-2 uppercase tracking-tighter">Mission Hub</h3>
            <div id="community-tasks" class="space-y-4"></div>
        </div>

        <div id="create" class="tab-content space-y-6">
            <div class="bg-white p-10 rounded-[3.5rem] border border-gray-100">
                <h3 class="font-black text-2xl mb-8 italic uppercase tracking-tighter">Boost Your Socials</h3>
                <div class="space-y-5">
                    <select id="promo-type" class="w-full p-5 rounded-2xl border bg-gray-50 font-black text-xs outline-none">
                        <option value="YouTube">YouTube Subscribe (30 ELITE)</option>
                        <option value="TikTok">TikTok Follow (20 ELITE)</option>
                    </select>
                    <input type="url" id="promo-url" placeholder="Paste Channel/Profile URL" class="w-full p-5 rounded-2xl border outline-none font-bold text-xs bg-gray-50">
                    <input type="number" id="promo-count" placeholder="Quantity of Subs/Follows" class="w-full p-5 rounded-2xl border outline-none font-bold text-xs bg-gray-50">
                    <button onclick="publishAd(this)" class="w-full bg-black text-white p-6 rounded-[2.2rem] font-black uppercase text-[11px] shadow-lg mt-4">Deploy Campaign</button>
                </div>
            </div>
        </div>

        <div id="wallet" class="tab-content">
            <div class="bg-white p-10 rounded-[4rem] border border-gray-100 text-center shadow-sm">
                <div class="w-24 h-24 bg-blue-600 rounded-full mx-auto mb-6 flex items-center justify-center text-white text-4xl font-black shadow-2xl border-4 border-white" id="user-initial">P</div>
                <h3 id="display-username" class="font-black text-3xl uppercase tracking-tighter">USER</h3>
                <p id="display-email" class="text-[10px] text-gray-400 font-bold mb-10 italic">...</p>
                <button onclick="handleLogout()" class="w-full bg-red-50 text-red-500 p-6 rounded-[2.2rem] font-black uppercase text-[10px] tracking-widest">Terminate Session</button>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 z-50 px-8 pb-10 pointer-events-none">
        <nav class="bg-white/95 backdrop-blur-3xl border border-gray-200 flex justify-around items-center py-5 rounded-[3.5rem] shadow-2xl pointer-events-auto">
            <button onclick="showTab('dashboard')" class="nav-btn flex flex-col items-center gap-1 transition-all"><span class="text-2xl">🏠</span><span class="text-[7px] font-black">HOME</span></button>
            <button onclick="showTab('leaderboard')" class="nav-btn flex flex-col items-center gap-1 opacity-30 transition-all"><span class="text-2xl">🏆</span><span class="text-[7px] font-black">RANKS</span></button>
            <button onclick="showTab('tasks')" class="nav-btn -mt-16 bg-black text-white w-20 h-20 rounded-full flex flex-col items-center justify-center shadow-2xl border-[6px] border-[#F8F8F7] active:scale-90 transition-all"><span class="text-3xl">💰</span><span class="text-[7px] font-black">MINE</span></button>
            <button onclick="showTab('wallet')" class="nav-btn flex flex-col items-center gap-1 opacity-30 transition-all"><span class="text-2xl">👤</span><span class="text-[7px] font-black">USER</span></button>
            <button onclick="showTab('create')" class="nav-btn flex flex-col items-center gap-1 opacity-30 transition-all"><span class="text-2xl">⚡</span><span class="text-[7px] font-black">ADS</span></button>
        </nav>
    </div>

    <script>
        const SB_URL = "https://hpxjobaqlhhdziqxulbw.supabase.co";
        const SB_KEY = "sb_publishable_RT99o_ShPhPpnH6F0uNwgQ_p_jSihbj"; 
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        
        let currentUser = null;
        let authMode = "reg";
        const MASTER_PIN = "eeusjdnbdgxg#)$kj6283928kshdgx";

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) { await loadProfile(session.user); } 
            else { document.getElementById('auth-screen').classList.remove('hidden'); }
            
            setTimeout(() => {
                document.getElementById('splash-loader').style.opacity = '0';
                setTimeout(() => document.getElementById('splash-loader').style.display = 'none', 500);
            }, 1000);

            showTab(localStorage.getItem('activeTab') || 'dashboard');
            setInterval(updateLiveYield, 1000);
        };

        async function loadProfile(user) {
            const { data } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
            if(data) {
                currentUser = data;
                document.getElementById('balance-display').innerText = data.tokens.toFixed(2);
                document.getElementById('staked-display').innerText = (data.staked_tokens || 0).toFixed(0);
                document.getElementById('display-username').innerText = data.username;
                document.getElementById('display-email').innerText = user.email;
                document.getElementById('user-initial').innerText = (data.username || "P").charAt(0).toUpperCase();
                document.getElementById('auth-screen').classList.add('hidden');
                
                // Show Welcome Bonus if not claimed
                if (data.bonus_claimed === false) {
                    document.getElementById('bonus-modal').style.display = 'flex';
                }

                loadCommunityTasks(); loadLeaderboard();
            }
        }

        async function executeClaimBonus(btn) {
            btn.disabled = true;
            btn.innerHTML = "Processing...";
            
            // Play Good Feeling Sound
            try { 
                const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3'); 
                audio.play(); 
            } catch(e) {}

            const { error } = await supabaseClient.rpc('claim_welcome_bonus');
            if (!error) {
                btn.innerHTML = "✅ SUCCESS!";
                setTimeout(() => location.reload(), 800);
            } else {
                alert("Claim failed. Please try again.");
                btn.disabled = false;
            }
        }

        function updateLiveYield() {
            if (!currentUser || !currentUser.staked_tokens || currentUser.staked_tokens <= 0) {
                document.getElementById('live-mining-counter').innerText = "0.000000";
                document.getElementById('live-yield-main').innerText = "+0.000000";
                return;
            }
            const seconds = (new Date() - new Date(currentUser.last_sync_time)) / 1000;
            const yieldAmt = (currentUser.staked_tokens * 0.04 * seconds) / 86400;
            const display = yieldAmt.toFixed(6);
            document.getElementById('live-mining-counter').innerText = display;
            document.getElementById('live-yield-main').innerText = "+" + display;
        }

        async function startMining() {
            if (currentUser.tokens <= 0) return alert("Zero tokens available to stake.");
            await supabaseClient.from('profiles').update({ staked_tokens: currentUser.tokens, tokens: 0, last_sync_time: new Date().toISOString() }).eq('id', currentUser.id);
            location.reload();
        }

        async function unlockMining() { await supabaseClient.rpc('process_mining_claim'); location.reload(); }

        async function publishAd(btn) {
            const type = document.getElementById('promo-type').value;
            const url = document.getElementById('promo-url').value;
            const count = parseInt(document.getElementById('promo-count').value);
            const cost = type === 'YouTube' ? 30 : 20;
            if (currentUser.tokens < (count * cost)) return alert("Insufficient Balance");
            await supabaseClient.from('profiles').update({ tokens: currentUser.tokens - (count * cost) }).eq('id', currentUser.id);
            await supabaseClient.from('user_tasks').insert([{ creator_id: currentUser.id, type, url, reward: type === 'YouTube' ? 29.009 : 19.009, remaining: count }]);
            location.reload();
        }

        async function loadCommunityTasks() {
            const { data } = await supabaseClient.from('user_tasks').select('*').gt('remaining', 0);
            if (data) {
                document.getElementById('community-tasks').innerHTML = data.map(t => `
                    <div class="bg-white p-6 rounded-[2.5rem] border flex justify-between items-center shadow-sm">
                        <div><p class="font-black text-[10px] uppercase text-gray-400 tracking-widest">${t.type} Task</p><p class="text-sm text-blue-600 font-black">+${t.reward} ELITE</p></div>
                        <button onclick="claimReward('${t.url}', '${t.id}')" class="bg-black text-white px-8 py-3 rounded-2xl text-[9px] font-black uppercase">Earn</button>
                    </div>
                `).join('');
            }
        }

        async function claimReward(url, taskId) {
            window.open(url, '_blank');
            const { error } = await supabaseClient.rpc('claim_social_reward', { task_id_input: taskId });
            if (!error) location.reload();
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            localStorage.setItem('activeTab', id);
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('opacity-30'));
            const activeBtn = Array.from(document.querySelectorAll('.nav-btn')).find(b => b.getAttribute('onclick').includes(`'${id}'`));
            if(activeBtn) activeBtn.classList.remove('opacity-30');
        }

        async function loadLeaderboard() {
            const { data } = await supabaseClient.from('profiles').select('username, tokens, staked_tokens').order('tokens', { ascending: false }).limit(10);
            if (data) document.getElementById('leaderboard-list').innerHTML = data.map((u, i) => `
                <div class="bg-white p-6 rounded-[2rem] flex justify-between border-2 border-transparent hover:border-blue-100 items-center transition-all">
                    <span class="font-black italic text-sm uppercase">#${i+1} ${u.username}</span>
                    <span class="text-blue-600 font-black text-base">${(u.tokens + (u.staked_tokens || 0)).toFixed(2)}</span>
                </div>
            `).join('');
        }

        async function submitAuth(btn) {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const user = document.getElementById('username').value;
            if(authMode === 'reg' && document.getElementById('sec-code').value !== MASTER_PIN) return alert("Invalid Access Pin");
            const { data, error } = authMode === 'reg' ? 
                await supabaseClient.auth.signUp({ email, password: pass, options: { data: { username: user } } }) :
                await supabaseClient.auth.signInWithPassword({ email, password: pass });
            if(!error) location.reload(); else alert(error.message);
        }

        function toggleAuth(m) { authMode = m; document.getElementById('reg-only').style.display = m === 'reg' ? 'block' : 'none'; }
        async function handleLogout() { localStorage.clear(); await supabaseClient.auth.signOut(); location.reload(); }
    </script>
</body>
    </html>
