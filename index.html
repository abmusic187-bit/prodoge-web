<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRODOGE.BERT.COM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #F8F8F7; color: #000; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .active { display: block; }
        .nav-btn.active-tab { opacity: 1 !important; color: #2563eb; }
        #splash-loader { transition: opacity 0.5s ease; }
        .pulse-logo { animation: pulse 1.5s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.95); } }
        .loader-spin { border: 2px solid #ccc; border-top: 2px solid #000; border-radius: 50%; width: 14px; height: 14px; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-32">

    <div id="splash-loader" class="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center">
        <h1 class="text-white text-4xl font-black italic pulse-logo tracking-tighter">PRODOGE</h1>
        <p class="text-blue-600 text-[8px] font-black tracking-[0.5em] mt-4 uppercase text-center">Elite P2P Network</p>
    </div>

    <div id="auth-screen" class="fixed inset-0 bg-[#F8F8F7] z-50 p-6 overflow-y-auto hidden text-center">
        <div class="max-w-md mx-auto">
            <h1 class="text-5xl font-black mb-10 tracking-tighter italic">PRODOGE</h1>
            <div class="flex bg-white p-1 rounded-2xl mb-8 border border-gray-100 shadow-sm">
                <button onclick="toggleAuth('reg')" id="btn-reg" class="flex-1 py-4 font-black rounded-xl bg-black text-white">REGISTER</button>
                <button onclick="toggleAuth('log')" id="btn-log" class="flex-1 py-4 font-black text-gray-400">LOGIN</button>
            </div>
            <div class="space-y-4">
                <div id="reg-only" class="space-y-4">
                    <input type="text" id="username" placeholder="Username" class="w-full p-5 rounded-2xl border border-gray-100 outline-none font-bold">
                    <input type="password" id="sec-code" placeholder="Master Pin" class="w-full p-5 rounded-2xl border border-gray-100 outline-none font-bold text-center">
                </div>
                <input type="email" id="email" placeholder="Email" class="w-full p-5 rounded-2xl border border-gray-100 outline-none font-bold">
                <input type="password" id="password" placeholder="Password" class="w-full p-5 rounded-2xl border border-gray-100 outline-none font-bold">
                <button onclick="submitAuth(this)" class="w-full bg-black text-white p-6 rounded-[2.5rem] font-black text-xl shadow-2xl active:scale-95 transition uppercase">Connect Account</button>
            </div>
        </div>
    </div>

    <header class="p-6 border-b border-gray-100 bg-white/80 backdrop-blur-md sticky top-0 z-10 flex justify-between items-center">
        <span class="font-black text-2xl tracking-tighter italic">PRODOGE</span>
        <button onclick="handleLogout()" class="text-[10px] font-black uppercase text-red-500 bg-red-50 px-4 py-2 rounded-full border border-red-100">Log Out</button>
    </header>

    <main class="p-6 max-w-md mx-auto">
        <div id="dashboard" class="tab-content active text-center">
            <div class="bg-white p-12 rounded-[4rem] shadow-sm border border-gray-100">
                <p class="text-gray-400 text-[10px] font-black uppercase mb-4 tracking-[0.4em]">Tokens</p>
                <h2 id="balance-display" class="text-8xl font-black mb-4 tracking-tighter">0</h2>
                <div class="bg-blue-600 text-white text-[10px] px-6 py-2 rounded-full font-black uppercase italic tracking-widest inline-block">Verified</div>
            </div>
        </div>

        <div id="tasks" class="tab-content space-y-4">
            <h3 class="font-black text-2xl mb-6 italic px-2">Task Hub</h3>
            <div id="community-tasks" class="space-y-4"></div>
        </div>

        <div id="create" class="tab-content">
            <div class="bg-white p-10 rounded-[3.5rem] border border-gray-100 shadow-sm space-y-6">
                <h3 class="font-black text-2xl mb-2 italic">New Ad</h3>
                <input type="text" id="ad-url" placeholder="Social Link" class="w-full p-5 bg-gray-50 rounded-2xl outline-none font-bold border border-gray-100">
                <input type="number" id="ad-qty" placeholder="Quantity" class="w-full p-5 bg-gray-50 rounded-2xl outline-none font-bold border border-gray-100">
                <button onclick="deployAd(this)" class="w-full bg-black text-white p-6 rounded-[2.5rem] font-black uppercase">Deploy</button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-8 left-6 right-6 bg-white/95 backdrop-blur-md border border-gray-100 flex justify-around py-6 rounded-[3rem] shadow-2xl z-20">
        <button onclick="showTab('dashboard')" class="nav-btn flex flex-col items-center gap-1 active-tab"><span class="text-xl">🏠</span><span class="text-[8px] font-black">HOME</span></button>
        <button onclick="showTab('tasks')" class="nav-btn flex flex-col items-center gap-1 opacity-30"><span class="text-xl">💰</span><span class="text-[8px] font-black">MINE</span></button>
        <button onclick="showTab('create')" class="nav-btn flex flex-col items-center gap-1 opacity-30"><span class="text-xl">⚡</span><span class="text-[8px] font-black">ADS</span></button>
    </nav>

    <script>
        const SB_URL = "https://cnskfvzyfqovovhzkjcs.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuc2tmdnp5ZnFvdm92aHpramNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjYyNzgsImV4cCI6MjA5MDQ0MjI3OH0.l5FSXPHWqh5oXqF0mnxYrSQaqjrMlmiRgTk2es-e4Hc"; 
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let authMode = "reg";
        const MASTER_PIN = "eeusjdnbdgxg#)$kj6283928kshdgx";

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) { await loadProfile(session.user); } 
            else { document.getElementById('auth-screen').classList.remove('hidden'); }
            
            setTimeout(() => { 
                document.getElementById('splash-loader').style.opacity = '0'; 
                setTimeout(() => document.getElementById('splash-loader').classList.add('hidden'), 500); 
            }, 1000);
        };

        async function loadProfile(user) {
            const { data } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
            if(data) {
                currentUser = data;
                document.getElementById('balance-display').innerText = data.tokens;
                document.getElementById('auth-screen').classList.add('hidden');
                loadCommunityTasks();
            }
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('opacity-30'));
            event.currentTarget.classList.remove('opacity-30');
        }

        async function loadCommunityTasks() {
            const { data } = await supabaseClient.from('user_tasks').select('*').gt('remaining', 0);
            if (data) {
                document.getElementById('community-tasks').innerHTML = data.map(task => `
                    <div class="bg-white p-6 rounded-[2.5rem] border border-gray-100 shadow-sm flex justify-between items-center">
                        <div><p class="font-black text-sm uppercase">${task.type}</p><p class="text-[10px] text-blue-600">+${task.reward} ELITE</p></div>
                        <button onclick="window.open('${task.url}')" class="bg-black text-white px-8 py-3 rounded-2xl text-[10px] font-black">VISIT</button>
                    </div>
                `).join('');
            }
        }

        async function submitAuth(btn) {
            const user = document.getElementById('username').value;
            const pin = document.getElementById('sec-code').value;
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            if(authMode === 'reg' && pin !== MASTER_PIN) return alert("Invalid Pin");

            const { data, error } = authMode === 'reg' ? 
                await supabaseClient.auth.signUp({ email, password: pass, options: { data: { username: user } } }) :
                await supabaseClient.auth.signInWithPassword({ email, password: pass });
            
            if(!error) loadProfile(data.user); else alert(error.message);
        }

        function toggleAuth(mode) {
            authMode = mode;
            document.getElementById('reg-only').style.display = mode === 'reg' ? 'block' : 'none';
        }

        async function handleLogout() { await supabaseClient.auth.signOut(); location.reload(); }
    </script>
</body>
    </html>
