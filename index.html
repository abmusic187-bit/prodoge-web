<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRODOGE CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .active { display: block; }
        #screen-reader { display: none; background: rgba(0,0,0,0.98); z-index: 1000; }
        .scan-bar { height: 2px; background: #3b82f6; width: 100%; position: absolute; box-shadow: 0 0 20px #3b82f6; animation: scanning 1.5s ease-in-out infinite; }
        @keyframes scanning { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
        .glitch { animation: glitch 0.3s infinite; }
        @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 40% { transform: translate(-2px, -2px); } 60% { transform: translate(2px, 2px); } 80% { transform: translate(2px, -2px); } 100% { transform: translate(0); } }
    </style>
</head>
<body class="pb-32 overflow-hidden">

    <div id="screen-reader" class="fixed inset-0 flex flex-col items-center justify-center p-6">
        <div class="relative w-full max-w-sm aspect-square border-2 border-blue-500/20 rounded-3xl overflow-hidden bg-gray-900/50 backdrop-blur-xl">
            <div class="scan-bar"></div>
            <div class="absolute inset-0 flex flex-col items-center justify-center p-8">
                <div id="reader-icon" class="text-6xl mb-6">🔍</div>
                <div class="font-mono text-left w-full space-y-2 opacity-70">
                    <p id="l1" class="text-[10px] text-blue-400">> INITIALIZING DEEP SCAN...</p>
                    <p id="l2" class="text-[10px] text-blue-400 hidden">> LOCATING TARGET THREAD...</p>
                    <p id="l3" class="text-[10px] text-blue-400 hidden">> VERIFYING INTERACTION...</p>
                    <p id="l4" class="text-[10px] text-green-400 hidden">> TOKEN SIGNATURE MATCHED.</p>
                </div>
            </div>
        </div>
        <div class="mt-8 w-full max-w-sm">
            <p id="reader-msg" class="text-center font-black text-xs uppercase tracking-widest text-blue-500 mb-4">Switch to the app to start scan</p>
            <button id="claim-trigger" disabled onclick="processRealClaim()" class="w-full bg-blue-600 py-6 rounded-2xl font-black uppercase text-sm opacity-20 transition-all">Waiting for Signal...</button>
        </div>
    </div>

    <div class="fixed top-8 left-6 right-6 flex justify-between items-center z-50">
        <h1 class="italic font-black text-2xl tracking-tighter">PRODOGE</h1>
        <div class="bg-white/10 backdrop-blur-md px-4 py-2 rounded-xl border border-white/10">
            <span id="balance-display" class="font-black text-blue-500">0</span>
            <span class="text-[10px] opacity-50 ml-1">ELITE</span>
        </div>
    </div>

    <main class="pt-28 p-6 max-w-md mx-auto h-screen overflow-y-auto">
        <div id="tasks" class="tab-content active space-y-4">
            <div class="flex justify-between items-end mb-4 px-2">
                <h3 class="font-black text-3xl italic">MISSIONS</h3>
                <span class="text-[10px] font-bold opacity-40">AUTO-REFRESHING</span>
            </div>
            <div id="mission-list" class="space-y-4">
                </div>
        </div>
    </main>

    <nav class="fixed bottom-10 left-8 right-8 bg-white/5 backdrop-blur-2xl border border-white/10 rounded-[2.5rem] p-2 flex justify-around items-center">
        <button onclick="location.reload()" class="p-4 text-xl">🏠</button>
        <button class="bg-blue-600 p-4 rounded-full text-xl shadow-lg shadow-blue-500/20">💰</button>
        <button onclick="alert('Profile Locked during scan')" class="p-4 text-xl opacity-30">👤</button>
    </nav>

    <script>
        const SB_URL = "https://cnskfvzyfqovovhzkjcs.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuc2tmdnp5ZnFvdm92aHpramNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjYyNzgsImV4cCI6MjA5MDQ0MjI3OH0.l5FSXPHWqh5oXqF0mnxYrSQaqjrMlmiRgTk2es-e4Hc"; 
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        let user = null;
        let activeTask = null;
        let hasLeftPage = false;

        window.onload = async () => {
            const { data } = await supabase.auth.getSession();
            if (data.session) {
                const profile = await supabase.from('profiles').select('*').eq('id', data.session.user.id).single();
                user = profile.data;
                document.getElementById('balance-display').innerText = user.tokens;
                loadMissions();
            } else {
                // Placeholder for your login logic
                alert("Please login first");
            }
        };

        async function loadMissions() {
            // Using the VIEW we created to hide completed tasks
            const { data } = await supabase.from('available_tasks').select('*');
            const list = document.getElementById('mission-list');
            
            if (!data || data.length === 0) {
                list.innerHTML = `<p class="text-center py-20 opacity-30 font-bold">ALL MISSIONS COMPLETED</p>`;
                return;
            }

            list.innerHTML = data.map(t => `
                <div class="bg-white/5 border border-white/5 p-6 rounded-[2rem] flex justify-between items-center group">
                    <div>
                        <p class="text-[10px] font-black text-blue-500 mb-1 uppercase tracking-widest">${t.type}</p>
                        <p class="font-bold text-lg">+${t.reward} <span class="text-[10px] opacity-40">ELITE</span></p>
                    </div>
                    <button onclick="initiateReader('${t.id}', '${t.url}')" class="bg-white text-black font-black px-8 py-4 rounded-2xl text-xs hover:bg-blue-600 hover:text-white transition-all">OPEN</button>
                </div>
            `).join('');
        }

        function initiateReader(id, url) {
            activeTask = id;
            hasLeftPage = false;
            window.open(url, '_blank');
            
            document.getElementById('screen-reader').style.display = 'flex';
            
            // Detection logic: Wait for the user to leave and come back
            const detectReturn = () => {
                if (document.visibilityState === 'hidden') {
                    hasLeftPage = true; // User actually went to the link
                }
                
                if (document.visibilityState === 'visible' && hasLeftPage) {
                    runScanSequencer();
                    document.removeEventListener('visibilitychange', detectReturn);
                }
            };
            document.addEventListener('visibilitychange', detectReturn);
        }

        function runScanSequencer() {
            const msg = document.getElementById('reader-msg');
            const btn = document.getElementById('claim-trigger');
            
            msg.innerText = "System returned. Starting Deep Scan...";
            
            setTimeout(() => { document.getElementById('l2').classList.remove('hidden'); }, 1000);
            setTimeout(() => { document.getElementById('l3').classList.remove('hidden'); }, 2500);
            setTimeout(() => { 
                document.getElementById('l4').classList.remove('hidden');
                document.getElementById('reader-icon').innerText = "✅";
                document.getElementById('reader-icon').classList.add('glitch');
                msg.innerText = "VERIFICATION COMPLETE";
                btn.disabled = false;
                btn.classList.remove('opacity-20');
                btn.innerText = "COLLECT REWARD";
            }, 4500);
        }

        async function processRealClaim() {
            const btn = document.getElementById('claim-trigger');
            btn.innerText = "SYNCING...";
            
            const { data, error } = await supabase.rpc('verify_social_task', { target_task_id: activeTask });

            if (error) {
                alert(error.message);
                location.reload();
            } else {
                // Success: The task will now disappear because of the SQL View
                alert("Tokens Added to Wallet!");
                location.reload();
            }
        }
    </script>
</body>
</html>
