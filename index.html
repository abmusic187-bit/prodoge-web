<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PRODOGE NETWORK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #F8F8F7; color: #000; font-family: sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; overflow-x: hidden; }
        .tab-content { display: none; }
        .active { display: block; }
        #splash-loader { transition: opacity 0.5s ease, visibility 0.5s; }
        .pulse-logo { animation: pulse 1.5s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.95); } }
        .spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* Mobile App Feel Adjustments */
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 24px); }
        .nav-shadow { shadow-top: 0 -10px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="pb-40">

    <div id="splash-loader" class="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center">
        <h1 class="text-white text-4xl font-black italic pulse-logo tracking-tighter">PRODOGE</h1>
        <p class="text-blue-600 text-[8px] font-black tracking-[0.5em] mt-4 uppercase">System Loading...</p>
    </div>

    <header class="fixed top-0 left-0 right-0 z-40 p-5 flex justify-between items-start pointer-events-none">
        <div class="pointer-events-auto">
            <h1 class="text-xl font-black italic tracking-tighter text-black">PRODOGE</h1>
            <div class="h-1 w-8 bg-blue-600 rounded-full"></div>
        </div>

        <div class="absolute left-1/2 -translate-x-1/2 pointer-events-auto">
            <div class="bg-black text-white px-4 py-2 rounded-2xl shadow-xl flex flex-col items-center min-w-[120px] border-b-2 border-blue-600">
                <span class="text-[7px] font-black tracking-widest text-blue-400 uppercase">Live Mining</span>
                <span id="live-mining-counter" class="text-xs font-mono font-bold">0.000000</span>
            </div>
        </div>

        <div class="bg-white/90 backdrop-blur-md border border-gray-100 px-3 py-1.5 rounded-xl shadow-sm flex items-center gap-2 pointer-events-auto">
            <span class="text-[8px] font-black text-blue-600">BAL</span>
            <span id="balance-display" class="text-sm font-black tracking-tighter">0.00</span>
        </div>
    </header>

    <div id="auth-screen" class="fixed inset-0 bg-[#F8F8F7] z-50 p-6 hidden text-center overflow-y-auto">
        <div class="max-w-md mx-auto pt-16">
            <h1 class="text-5xl font-black mb-10 italic">PRODOGE</h1>
            <div class="flex bg-white p-1 rounded-2xl mb-8 border border-gray-100">
                <button onclick="toggleAuth('reg')" id="btn-reg" class="flex-1 py-4 font-black rounded-xl bg-black text-white">REG</button>
                <button onclick="toggleAuth('log')" id="btn-log" class="flex-1 py-4 font-black text-gray-400">LOG</button>
            </div>
            <div class="space-y-4">
                <div id="reg-only" class="space-y-4">
                    <input type="text" id="username" placeholder="Username" class="w-full p-5 rounded-2xl border outline-none font-bold">
                    <input type="password" id="sec-code" placeholder="Master Pin" class="w-full p-5 rounded-2xl border outline-none font-bold text-center">
                </div>
                <input type="email" id="email" placeholder="Email" class="w-full p-5 rounded-2xl border outline-none font-bold">
                <input type="password" id="password" placeholder="Password" class="w-full p-5 rounded-2xl border outline-none font-bold">
                <button onclick="submitAuth(this)" class="w-full bg-black text-white p-6 rounded-[2.5rem] font-black uppercase text-sm">Initialize</button>
            </div>
        </div>
    </div>

    <main class="pt-28 p-6 max-w-md mx-auto">
        <div id="dashboard" class="tab-content text-center active">
            <div class="bg-white p-10 rounded-[3.5rem] border border-gray-100 shadow-sm mb-6">
                <div class="relative w-52 h-52 mx-auto mb-8">
                    <div class="absolute inset-0 rounded-full border-4 border-dashed border-blue-600/20 spin-slow"></div>
                    <div class="absolute inset-4 bg-gray-50 rounded-full flex flex-col items-center justify-center border shadow-inner">
                        <span class="text-3xl animate-pulse">💎</span>
                        <p class="text-[7px] font-black text-blue-600 mt-2 tracking-[0.3em] uppercase">Yield Rate: 4%</p>
                        <h2 id="live-yield-main" class="text-2xl font-black mt-1">+0.000000</h2>
                    </div>
                </div>
                <div class="space-y-1">
                    <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Active Stake</p>
                    <div class="flex justify-center items-baseline gap-1">
                        <span id="staked-display" class="text-4xl font-black">0</span>
                        <span class="text-xs font-bold text-blue-600">ELITE</span>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="startMining()" class="bg-black text-white p-5 rounded-[2rem] font-black uppercase text-[9px] shadow-lg active:scale-95 transition-all">Start Machine</button>
                <button onclick="unlockMining()" class="bg-white text-blue-600 p-5 rounded-[2rem] font-black uppercase text-[9px] border border-blue-100 shadow-sm active:scale-95 transition-all">Claim Profit</button>
            </div>
        </div>

        <div id="leaderboard" class="tab-content space-y-4">
            <h3 class="font-black text-2xl italic px-2 uppercase">Elite Ranks</h3>
            <div id="leaderboard-list" class="space-y-2"></div>
        </div>

        <div id="tasks" class="tab-content space-y-4">
            <h3 class="font-black text-2xl italic px-2 uppercase">Mission Hub</h3>
            <div id="community-tasks" class="space-y-4"></div>
        </div>

        <div id="create" class="tab-content space-y-4">
            <div class="bg-white p-8 rounded-[3rem] border border-gray-100">
                <h3 class="font-black text-2xl mb-6 italic uppercase">Boost Socials</h3>
                <div class="space-y-4">
                    <select id="promo-type" class="w-full p-4 rounded-2xl border bg-gray-50 font-bold text-xs outline-none">
                        <option value="YouTube">YouTube Sub (30 ELITE)</option>
                        <option value="TikTok">TikTok Follow (20 ELITE)</option>
                    </select>
                    <input type="url" id="promo-url" placeholder="Profile URL" class="w-full p-4 rounded-2xl border outline-none font-bold text-xs">
                    <input type="number" id="promo-count" placeholder="Amount" class="w-full p-4 rounded-2xl border outline-none font-bold text-xs">
                    <button onclick="publishAd(this)" class="w-full bg-black text-white p-5 rounded-[2rem] font-black uppercase text-[10px]">Launch Campaign</button>
                </div>
            </div>
        </div>

        <div id="wallet" class="tab-content">
            <div class="bg-white p-8 rounded-[3.5rem] border border-gray-100 text-center">
                <div class="w-20 h-20 bg-blue-600 rounded-full mx-auto mb-4 flex items-center justify-center text-white text-3xl font-black shadow-lg" id="user-initial">P</div>
                <h3 id="display-username" class="font-black text-2xl uppercase tracking-tighter">User</h3>
                <p id="display-email" class="text-[9px] text-gray-400 font-bold mb-8 italic">...</p>
                <button onclick="handleLogout()" class="w-full bg-red-50 text-red-500 p-5 rounded-[2rem] font-black uppercase text-[9px]">Logout Session</button>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 z-50 px-6 pb-8 pointer-events-none">
        <nav class="bg-white/95 backdrop-blur-2xl border border-gray-200 flex justify-around items-center py-4 rounded-[3rem] shadow-2xl pointer-events-auto">
            <button onclick="showTab('dashboard')" class="nav-btn flex flex-col items-center gap-1 transition-all"><span class="text-xl">🏠</span><span class="text-[7px] font-black">HOME</span></button>
            <button onclick="showTab('leaderboard')" class="nav-btn flex flex-col items-center gap-1 opacity-30 transition-all"><span class="text-xl">🏆</span><span class="text-[7px] font-black">RANKS</span></button>
            <button onclick="showTab('tasks')" id="mine-btn-central" class="nav-btn -mt-14 bg-black text-white w-16 h-16 rounded-full flex flex-col items-center justify-center shadow-2xl border-4 border-[#F8F8F7] active:scale-90 transition-all"><span class="text-2xl">💰</span><span class="text-[7px] font-black">MINE</span></button>
            <button onclick="showTab('wallet')" class="nav-btn flex flex-col items-center gap-1 opacity-30 transition-all"><span class="text-xl">👤</span><span class="text-[7px] font-black">USER</span></button>
            <button onclick="showTab('create')" class="nav-btn flex flex-col items-center gap-1 opacity-30 transition-all"><span class="text-xl">⚡</span><span class="text-[7px] font-black">ADS</span></button>
        </nav>
        <div class="h-2"></div> </div>

    <script>
        const SB_URL = "https://hpxjobaqlhhdziqxulbw.supabase.co";
        const SB_KEY = "sb_publishable_RT99o_ShPhPpnH6F0uNwgQ_p_jSihbj"; 
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        
        let currentUser = null;
        let authMode = "reg";
        const MASTER_PIN = "eeusjdnbdgxg#)$kj6283928kshdgx";

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) { await loadProfile(session.user); } 
            else { document.getElementById('auth-screen').classList.remove('hidden'); }
            
            setTimeout(() => {
                document.getElementById('splash-loader').style.opacity = '0';
                setTimeout(() => document.getElementById('splash-loader').style.display = 'none', 500);
            }, 1000);

            showTab(localStorage.getItem('activeTab') || 'dashboard');
            setInterval(updateLiveYield, 1000);
        };

        async function loadProfile(user) {
            const { data } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
            if(data) {
                currentUser = data;
                document.getElementById('balance-display').innerText = data.tokens.toFixed(2);
                document.getElementById('staked-display').innerText = data.staked_tokens || 0;
                document.getElementById('display-username').innerText = data.username;
                document.getElementById('display-email').innerText = user.email;
                document.getElementById('user-initial').innerText = (data.username || "P").charAt(0).toUpperCase();
                document.getElementById('auth-screen').classList.add('hidden');
                loadCommunityTasks(); loadLeaderboard();
            }
        }

        function updateLiveYield() {
            if (!currentUser || !currentUser.staked_tokens || currentUser.staked_tokens <= 0) {
                document.getElementById('live-mining-counter').innerText = "0.000000";
                document.getElementById('live-yield-main').innerText = "+0.000000";
                return;
            }
            const seconds = (new Date() - new Date(currentUser.last_sync_time)) / 1000;
            const yieldAmt = (currentUser.staked_tokens * 0.04 * seconds) / 86400;
            const display = yieldAmt.toFixed(6);
            document.getElementById('live-mining-counter').innerText = display;
            document.getElementById('live-yield-main').innerText = "+" + display;
        }

        // SUPABASE ACTIONS
        async function startMining() {
            if (currentUser.tokens <= 0) return alert("Zero Balance");
            await supabaseClient.from('profiles').update({ staked_tokens: currentUser.tokens, tokens: 0, last_sync_time: new Date().toISOString() }).eq('id', currentUser.id);
            location.reload();
        }

        async function unlockMining() { await supabaseClient.rpc('process_mining_claim'); location.reload(); }

        async function publishAd(btn) {
            const type = document.getElementById('promo-type').value;
            const url = document.getElementById('promo-url').value;
            const count = parseInt(document.getElementById('promo-count').value);
            const cost = type === 'YouTube' ? 30 : 20;
            if (currentUser.tokens < (count * cost)) return alert("Low Funds");
            await supabaseClient.from('profiles').update({ tokens: currentUser.tokens - (count * cost) }).eq('id', currentUser.id);
            await supabaseClient.from('user_tasks').insert([{ creator_id: currentUser.id, type, url, reward: type === 'YouTube' ? 29.009 : 19.009, remaining: count }]);
            location.reload();
        }

        async function loadCommunityTasks() {
            const { data } = await supabaseClient.from('user_tasks').select('*').gt('remaining', 0);
            if (data) {
                document.getElementById('community-tasks').innerHTML = data.map(t => `
                    <div class="bg-white p-5 rounded-[2rem] border flex justify-between items-center shadow-sm">
                        <div><p class="font-black text-[9px] uppercase text-gray-400">${t.type}</p><p class="text-xs text-blue-600 font-black">+${t.reward} ELITE</p></div>
                        <button onclick="claimReward('${t.url}', '${t.id}')" class="bg-black text-white px-6 py-2.5 rounded-xl text-[8px] font-black uppercase">Earn</button>
                    </div>
                `).join('');
            }
        }

        async function claimReward(url, taskId) {
            window.open(url, '_blank');
            const { error } = await supabaseClient.rpc('claim_social_reward', { task_id_input: taskId });
            if (!error) location.reload();
        }

        // UI NAVIGATION
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            localStorage.setItem('activeTab', id);
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('opacity-30'));
            const activeBtn = Array.from(document.querySelectorAll('.nav-btn')).find(b => b.getAttribute('onclick').includes(`'${id}'`));
            if(activeBtn) activeBtn.classList.remove('opacity-30');
        }

        async function loadLeaderboard() {
            // Note: Ranks now combine both tokens AND staked_tokens for a true "Total Elite" ranking
            const { data } = await supabaseClient.from('profiles').select('username, tokens, staked_tokens').order('tokens', { ascending: false }).limit(10);
            if (data) document.getElementById('leaderboard-list').innerHTML = data.map((u, i) => `
                <div class="bg-white p-5 rounded-2xl flex justify-between border items-center">
                    <span class="font-black italic text-xs uppercase tracking-tighter">#${i+1} ${u.username}</span>
                    <span class="text-blue-600 font-black text-sm">${(u.tokens + (u.staked_tokens || 0)).toFixed(2)}</span>
                </div>
            `).join('');
        }

        async function submitAuth(btn) {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const user = document.getElementById('username').value;
            if(authMode === 'reg' && document.getElementById('sec-code').value !== MASTER_PIN) return alert("Pin Incorrect");
            const { data, error } = authMode === 'reg' ? 
                await supabaseClient.auth.signUp({ email, password: pass, options: { data: { username: user } } }) :
                await supabaseClient.auth.signInWithPassword({ email, password: pass });
            if(!error) location.reload(); else alert(error.message);
        }

        function toggleAuth(m) { authMode = m; document.getElementById('reg-only').style.display = m === 'reg' ? 'block' : 'none'; }
        async function handleLogout() { localStorage.clear(); await supabaseClient.auth.signOut(); location.reload(); }
    </script>
</body>
                        </html>
