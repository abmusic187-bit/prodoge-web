<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PRODOGE AI NETWORK</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { background-color: #F8F8F7; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Layout */
        header { position: fixed; top: 0; left: 0; right: 0; height: 95px; z-index: 50; background: rgba(248, 248, 247, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        nav { position: fixed; bottom: 20px; left: 20px; right: 20px; height: 85px; z-index: 50; background: white; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid rgba(0,0,0,0.05); }
        main { padding-top: 115px; padding-bottom: 140px; max-width: 480px; margin: 0 auto; }

        /* UI Elements */
        .btn-press:active { transform: scale(0.95); transition: 0.1s; }
        .glass-ui { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(59, 130, 246, 0.3); }
        
        /* Animations */
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.4; } }
        .pulse-red { animation: pulse-red 1.5s infinite; }
    </style>
</head>
<body>

    <div id="auth-screen" class="fixed inset-0 bg-[#F8F8F7] z-[100] p-8 flex flex-col justify-center items-center text-center">
        <div class="w-20 h-20 bg-black rounded-3xl mb-6 flex items-center justify-center shadow-2xl">
            <span class="text-white font-black italic text-3xl">P</span>
        </div>
        <h1 class="text-5xl font-black italic tracking-tighter uppercase">PRODOGE</h1>
        <p class="text-[10px] font-black text-blue-600 uppercase tracking-[0.4em] mt-3 mb-12">AI NODE TERMINAL</p>
        
        <button onclick="loginWithGoogle()" class="w-full max-w-xs bg-white text-black p-5 rounded-3xl font-black uppercase text-[11px] btn-press shadow-xl flex items-center justify-center gap-4 border border-gray-200">
            <img src="https://www.google.com/favicon.ico" class="w-5 h-5">
            Continue with Google
        </button>
    </div>

    <div id="ai-overlay" class="fixed inset-0 bg-black/80 z-[110] hidden flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="glass-ui text-white p-8 rounded-[3rem] w-full max-w-sm text-center">
            <div class="flex justify-center mb-4"><div class="w-3 h-3 bg-red-600 rounded-full pulse-red"></div></div>
            <h3 class="text-xs font-black uppercase tracking-widest text-blue-400 mb-2">AI Analyzing...</h3>
            <p class="text-[10px] text-gray-400 uppercase mb-6">Complete the task then click verify</p>
            <button onclick="captureAndVerify()" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-xs uppercase btn-press shadow-lg">Verify Now</button>
            <button onclick="closeAI()" class="mt-4 text-[9px] uppercase font-bold opacity-50">Cancel</button>
        </div>
    </div>

    <header class="flex justify-between items-center px-6">
        <div class="bg-black text-white px-4 py-2 rounded-xl text-[10px] font-black italic">PRODOGE</div>
        <div class="bg-blue-600 text-white px-5 py-2 rounded-2xl shadow-lg flex flex-col items-center min-w-[120px]">
            <span class="text-[6px] font-black uppercase opacity-70 tracking-widest">Mining</span>
            <span id="hash-counter" class="text-[11px] font-mono font-bold">0.000000</span>
        </div>
        <div class="bg-white border border-gray-200 px-4 py-2 rounded-2xl shadow-sm">
            <span id="bal-display" class="text-sm font-black">0.00</span>
            <span class="text-[7px] font-black text-blue-600 ml-1 uppercase">ELITE</span>
        </div>
    </header>

    <main class="px-6">
        <div id="tab-home" class="tab-content active text-center">
            <div class="bg-white p-12 rounded-[4rem] border border-gray-100 shadow-sm mb-8">
                <div class="text-4xl mb-6">💎</div>
                <h2 id="yield-main" class="text-4xl font-black italic tracking-tighter">+0.000000</h2>
                <p id="staked-info" class="text-[10px] font-black text-blue-600 uppercase mt-4 tracking-widest opacity-70">0.00 ELITE STAKED</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="stakeAll()" class="bg-black text-white p-6 rounded-3xl font-black uppercase text-[10px] btn-press shadow-xl">Stake All</button>
                <button onclick="harvest()" class="bg-white border border-gray-200 p-6 rounded-3xl font-black uppercase text-[10px] btn-press shadow-sm">Harvest</button>
            </div>
        </div>

        <div id="tab-tasks" class="tab-content">
            <div class="bg-blue-600 p-6 rounded-3xl mb-6 shadow-xl flex justify-between items-center text-white">
                <div>
                    <p class="text-[8px] font-black uppercase tracking-widest opacity-80">Daily Bonus</p>
                    <h4 class="text-lg font-black italic uppercase">50 ELITE</h4>
                </div>
                <button onclick="claimDaily()" class="bg-white text-blue-600 px-6 py-3 rounded-2xl text-[10px] font-black uppercase btn-press">Claim</button>
            </div>
            <h3 class="font-black text-2xl italic uppercase tracking-tighter mb-6">Missions</h3>
            <div id="task-list" class="space-y-4"></div>
        </div>

        <div id="tab-ads" class="tab-content">
            <div class="bg-white p-10 rounded-[3rem] border shadow-sm">
                <h3 class="font-black text-xl italic uppercase mb-8 text-center text-blue-600">Deploy Boost</h3>
                <div class="space-y-4">
                    <select id="ad-platform" class="w-full p-4 border bg-gray-50 font-black text-xs uppercase rounded-2xl outline-none">
                        <option value="YouTube">YouTube</option>
                        <option value="TikTok">TikTok</option>
                        <option value="Instagram">Instagram</option>
                    </select>
                    <input type="url" id="ad-url" placeholder="Social Link" class="w-full p-4 border bg-gray-50 font-black text-xs rounded-2xl outline-none">
                    <input type="number" id="ad-count" placeholder="Quantity" class="w-full p-4 border bg-gray-50 font-black text-xs rounded-2xl outline-none">
                    <button onclick="deployBoost()" class="w-full bg-black text-white p-5 rounded-3xl font-black uppercase text-[10px] btn-press shadow-xl">Broadcast</button>
                </div>
            </div>
        </div>

        <div id="tab-ref" class="tab-content">
            <div class="bg-white p-10 rounded-[3rem] border text-center shadow-sm">
                <h3 class="font-black text-xl uppercase italic mb-6">Network Code</h3>
                <div class="bg-gray-50 p-8 rounded-3xl border-2 border-dashed border-gray-200 mb-6">
                    <h2 id="ref-code" class="text-3xl font-black tracking-widest text-blue-600 italic uppercase">...</h2>
                </div>
                <button onclick="copyInvite()" class="bg-black text-white px-8 py-4 rounded-2xl text-[10px] font-black uppercase btn-press">Copy Link</button>
            </div>
        </div>
    </main>

    <nav class="flex justify-around items-center">
        <button onclick="showTab('home')" id="nav-home" class="flex flex-col items-center">🏠<span class="text-[7px] font-black uppercase">Core</span></button>
        <button onclick="showTab('tasks')" id="nav-tasks" class="flex flex-col items-center opacity-40">🛰️<span class="text-[7px] font-black uppercase">Missions</span></button>
        <button onclick="showTab('ads')" id="nav-ads" class="flex flex-col items-center opacity-40">⚡<span class="text-[7px] font-black uppercase">Boost</span></button>
        <button onclick="showTab('ref')" id="nav-ref" class="flex flex-col items-center opacity-40">🤝<span class="text-[7px] font-black uppercase">Invite</span></button>
    </nav>

    <script>
        // --- CONFIGURATION ---
        const SB_URL = "https://xfvdjsupzluzlhahbcqz.supabase.co"; 
        const SB_KEY = "sb_publishable_cF29RStYnVFX2lBUa7w2UQ_ymPu13bs"; // REPLACE THIS
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        let user = null;
        let currentTaskId = null;

        // --- AUTH LOGIC ---
        async function loginWithGoogle() {
            const { data, error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin }
            });
        }

        async function initApp() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                const { data: profile } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
                user = profile;
                document.getElementById('auth-screen').classList.add('hidden');
                updateUI();
                loadTasks();
                setInterval(updateMiningTicker, 1000);
            }
        }

        function updateUI() {
            document.getElementById('bal-display').innerText = user.tokens.toFixed(2);
            document.getElementById('staked-info').innerText = (user.staked_tokens || 0).toFixed(2) + " ELITE STAKED";
            document.getElementById('ref-code').innerText = user.referral_code || "ALPHA";
        }

        // --- MINING LOGIC ---
        function updateMiningTicker() {
            if (!user.staked_tokens) return;
            const diff = (new Date() - new Date(user.last_sync_time)) / 1000;
            const earned = (user.staked_tokens * 0.04 * diff) / 86400;
            document.getElementById('hash-counter').innerText = earned.toFixed(6);
            document.getElementById('yield-main').innerText = "+" + earned.toFixed(6);
        }

        async function stakeAll() {
            const total = user.tokens + (user.staked_tokens || 0);
            await supabase.from('profiles').update({ 
                staked_tokens: total, 
                tokens: 0, 
                last_sync_time: new Date().toISOString() 
            }).eq('id', user.id);
            location.reload();
        }

        async function harvest() {
            await supabase.rpc('process_mining_claim');
            location.reload();
        }

        // --- MISSIONS & AI ---
        async function loadTasks() {
            const { data } = await supabase.from('user_tasks').select('*').gt('remaining', 0).neq('creator_id', user.id);
            const list = document.getElementById('task-list');
            list.innerHTML = data?.map(t => `
                <div class="bg-white p-5 rounded-3xl border flex justify-between items-center shadow-sm">
                    <div>
                        <p class="text-[8px] font-black text-blue-600 uppercase">${t.platform}</p>
                        <p class="text-sm font-black">+${t.reward} ELITE</p>
                    </div>
                    <button onclick="openAITask('${t.url}', '${t.id}')" class="bg-black text-white px-6 py-3 rounded-2xl text-[9px] font-black uppercase btn-press">Execute</button>
                </div>
            `).join('') || '<p class="text-center text-gray-400 py-10 uppercase text-[9px]">Scanning for missions...</p>';
        }

        function openAITask(url, id) {
            currentTaskId = id;
            window.open(url, '_blank');
            document.getElementById('ai-overlay').classList.remove('hidden');
        }

        function closeAI() { document.getElementById('ai-overlay').classList.add('hidden'); }

        async function captureAndVerify() {
            // This triggers the /api/verify backend we discussed
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            // Logic to send frame to Gemini AI...
            alert("Submitting to AI Core...");
            location.reload();
        }

        async function claimDaily() {
            const { data, error } = await supabase.rpc('claim_daily_bonus', { user_id_uuid: user.id });
            if (error) alert("Already claimed today!");
            else { alert("✅ 50 ELITE Added!"); location.reload(); }
        }

        // --- BOOST ---
        async function deployBoost() {
            const url = document.getElementById('ad-url').value;
            const qty = parseInt(document.getElementById('ad-count').value);
            const cost = qty * 50;
            if (user.tokens < cost) return alert("Insufficient ELITE");
            
            await supabase.rpc('deploy_social_boost', {
                target_url: url, platform_name: document.getElementById('ad-platform').value,
                target_qty: qty, total_cost: cost
            });
            alert("Broadcasted!");
            location.reload();
        }

        // --- UI UTILS ---
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.add('opacity-40'));
            document.getElementById('tab-'+id).classList.add('active');
            document.getElementById('nav-'+id).classList.remove('opacity-40');
        }

        function copyInvite() {
            navigator.clipboard.writeText(window.location.origin + "?ref=" + user.referral_code);
            alert("Link Copied!");
        }

        initApp();
    </script>
</body>
            </html>
