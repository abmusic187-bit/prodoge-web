<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRODOGE AI v3 - Ocean Hologram</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* BASE STYLE: Ocean Teal from your photo */
        body { 
            background: #003B4F; 
            color: white; 
            font-family: 'Chakra Petch', sans-serif; 
            overflow-x: hidden;
            /* Radial gradient creates the depth look from your image */
            background-image: 
                radial-gradient(circle at center, rgba(0, 85, 115, 0.3) 0%, rgba(0, 30, 40, 1) 100%),
                url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48ZyBzdHJva2U9IiMwMEZBRkYiIHN0cm9rZS13aWR0aD0iMC4wNSIgZmlsbD0ibm9uZSI+PHBhdGggZD0iTTAgMGgxMDB2MTAwSDB6Ii8+PC9nPjwvc3ZnPg==');
            background-size: cover, 60px 60px;
        }

        /* HOLOGRAPHIC PAGE STYLE (Enhanced Glassmorphism) */
        .hologram-page {
            position: relative;
            background: rgba(0, 20, 30, 0.8);
            border: 1px solid rgba(0, 249, 255, 0.2);
            border-top: 3px solid #00F9FF;
            border-bottom: 3px solid #00F9FF;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 249, 255, 0.15), inset 0 0 15px rgba(0, 249, 255, 0.05);
            backdrop-filter: blur(12px);
            margin-bottom: 2rem;
            transform: perspective(1000px) rotateX(1deg);
        }

        /* Holographic Notifications */
        .hologram-notification {
            @apply hologram-page;
            border: 2px solid #00F9FF;
            transform: perspective(1000px) rotateX(2deg);
        }

        /* Updated Neon Color Scheme */
        .neon-text-teal { color: #00F9FF; text-shadow: 0 0 15px rgba(0, 249, 255, 0.8); } 
        .neon-text-cyan { color: #00F9FF; text-shadow: 0 0 10px rgba(0, 249, 255, 0.5); }
        .neon-text-white { color: white; text-shadow: 0 0 10px rgba(255, 255, 255, 0.7); }

        /* General UI Elements */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-press:active { transform: scale(0.96); transition: 0.1s; }
        
        header { background: rgba(0, 20, 30, 0.7) !important; border-bottom: 1px solid rgba(0, 249, 255, 0.2) !important; }
        nav { background: rgba(0, 20, 30, 0.9) !important; border-top: 1px solid rgba(0, 249, 255, 0.2) !important; }
    </style>
</head>
<body class="pb-28">

    <div id="auth-screen" class="fixed inset-0 z-[200] bg-[#001E28] flex flex-col items-center justify-center p-6">
        <div class="hologram-notification w-full max-w-sm text-center">
            <div class="flex items-center justify-center gap-3 border border-[#00F9FF] bg-[#002D3C]/70 px-6 py-2 rounded-md mb-8">
                <div class="w-6 h-6 border-2 border-[#00F9FF] rounded-full flex items-center justify-center text-[#00F9FF] font-black text-xs">!</div>
                <span class="font-bold text-xs uppercase tracking-[0.4em] neon-text-cyan">SYSTEM_INITIALIZE</span>
            </div>
            
            <h1 class="text-3xl font-black tracking-tighter mb-10 neon-text-white uppercase italic">PRODOGE_AI</h1>
            
            <button onclick="login()" class="w-full flex items-center justify-center gap-4 bg-transparent border-2 border-[#00F9FF] hover:bg-[#00F9FF]/10 text-white p-5 rounded-md font-bold text-sm uppercase tracking-widest btn-press shadow-[0_0_15px_rgba(0,249,255,0.3)] transition-all">
                <img src="https://www.google.com/favicon.ico" class="w-5 h-5 filter brightness-150">
                Sync Google Node
            </button>
        </div>
    </div>

    <header class="p-6 fixed top-0 left-0 right-0 z-50 flex justify-between items-center backdrop-blur-xl">
        <div>
            <p id="user-name" class="text-[10px] font-bold text-[#00F9FF] uppercase tracking-widest">Linking...</p>
            <h2 class="text-xl font-black italic neon-text-white uppercase tracking-tighter">CORE_UNIT</h2>
        </div>
        <div class="border border-[#00F9FF]/40 bg-black/40 px-4 py-2 rounded-lg text-right">
            <span class="text-[7px] text-[#00F9FF] font-bold uppercase tracking-widest">Available_Fuel</span>
            <div class="flex items-center gap-1">
                <span id="bal" class="text-lg font-mono font-bold neon-text-teal">0.00</span>
                <span class="text-[#00F9FF] text-[10px] font-black italic">ELITE</span>
            </div>
        </div>
    </header>

    <main class="pt-28 p-6 max-w-md mx-auto">
        
        <div id="tab-home" class="tab-content active">
            <div class="hologram-page text-center">
                <p class="text-[10px] font-bold text-white/50 uppercase tracking-[0.4em] mb-4">Neural_Mining_Yield</p>
                <h3 id="yield" class="text-5xl font-mono font-bold neon-text-teal mb-5 tracking-tighter">0.000000</h3>
                <p id="staked" class="text-[11px] font-bold text-[#00F9FF] bg-black/40 py-2 px-5 rounded-md inline-block uppercase tracking-widest border border-[#00F9FF]/20">0.00 Fuel_Staked</p>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="stake()" class="bg-[#00F9FF] hover:bg-[#57FDFF] p-6 rounded-md font-black uppercase text-xs btn-press text-[#001E28] shadow-[0_0_20px_rgba(0,249,255,0.4)]">Stake_All</button>
                <button onclick="harvest()" class="bg-transparent border-2 border-[#00F9FF] hover:bg-[#00F9FF]/10 p-6 rounded-md font-black uppercase text-xs btn-press text-white shadow-[0_0_10px_rgba(0,249,255,0.2)]">Harvest</button>
            </div>
        </div>

        <div id="tab-tasks" class="tab-content">
            <h2 class="text-2xl font-black italic mb-6 neon-text-white uppercase">MISSIONS</h2>
            <div id="task-list" class="space-y-4 text-center text-white/40 text-[11px] uppercase tracking-widest py-10 hologram-page">
                Searching for mission frequency...
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 h-24 backdrop-blur-xl flex justify-center items-center gap-16 p-4 shadow-[0_-5px_25px_rgba(0,0,0,0.5)]">
        <button onclick="showTab('home')" class="nav-btn text-2xl filter brightness-200 transition-all hover:scale-110">🏠</button>
        <button onclick="showTab('tasks')" class="nav-btn text-2xl filter brightness-50 grayscale transition-all hover:scale-110">🛰️</button>
        <button onclick="location.reload()" class="nav-btn text-2xl filter brightness-50 grayscale transition-all hover:scale-110">🔄</button>
    </nav>

    <script>
        const SB_URL = "https://htngfzwclkqsffozxfuo.supabase.co";
        const SB_KEY = "sb_publishable_2LJdcMlfhcEyNl_EMUx-2w_Ms5ZtJ5g";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let profile = null;

        async function login() {
            await sb.auth.signInWithOAuth({ 
                provider: 'google',
                options: { redirectTo: window.location.origin }
            });
        }

        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                document.getElementById('auth-screen').style.display = 'none';
                const { data } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
                if (data) {
                    profile = data;
                    render();
                    setInterval(updateMining, 1000);
                } else {
                    setTimeout(init, 2000);
                }
            }
        }

        function render() {
            document.getElementById('user-name').innerText = profile.username || "Agent_Node";
            document.getElementById('bal').innerText = Number(profile.tokens).toFixed(2);
            document.getElementById('staked').innerText = Number(profile.staked_tokens).toFixed(2) + " Fuel_Staked";
        }

        function updateMining() {
            if (!profile || !profile.staked_tokens) return;
            const now = new Date();
            const last = new Date(profile.last_sync_time);
            const diff = (now - last) / 1000;
            const earned = (profile.staked_tokens * 0.04 * diff) / 86400;
            document.getElementById('yield').innerText = earned.toFixed(6);
        }

        async function harvest() {
            const { error } = await sb.rpc('process_mining_claim');
            if (error) alert("Sync Error: " + error.message);
            else location.reload();
        }

        async function stake() {
            const total = Number(profile.tokens) + Number(profile.staked_tokens);
            const { error } = await sb.from('profiles')
                .update({ staked_tokens: total, tokens: 0, last_sync_time: new Date().toISOString() })
                .eq('id', profile.id);
            if (error) alert("Staking Error: " + error.message);
            else location.reload();
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.add('brightness-50', 'grayscale');
                b.classList.remove('brightness-200');
            });
            event.currentTarget.classList.remove('brightness-50', 'grayscale');
            event.currentTarget.classList.add('brightness-200');
        }

        window.onload = init;
    </script>
</body>
</html>
