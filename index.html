<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PRODOGE AI NETWORK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #F8F8F7; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .active { display: block; }
        header { position: fixed; top: 0; width: 100%; height: 80px; z-index: 100; background: rgba(248,248,247,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid #eee; }
        nav { position: fixed; bottom: 20px; left: 20px; right: 20px; height: 85px; z-index: 100; background: #fff; border-radius: 30px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        main { padding-top: 100px; padding-bottom: 120px; }
        .hidden { display: none !important; }
        .recording-pulse { animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="max-w-md mx-auto">

    <video id="hidden-video" autoplay muted class="hidden"></video>

    <div id="auth-screen" class="fixed inset-0 bg-[#F8F8F7] z-[200] p-8 flex flex-col justify-center">
        <h1 class="text-5xl font-black italic mb-10 text-center">PRODOGE</h1>
        <div id="auth-inputs" class="space-y-4">
            <input type="text" id="reg-user" placeholder="Username" class="w-full p-5 rounded-2xl border bg-white font-bold">
            <input type="email" id="auth-email" placeholder="Email" class="w-full p-5 rounded-2xl border bg-white font-bold">
            <input type="password" id="auth-pass" placeholder="Password" class="w-full p-5 rounded-2xl border bg-white font-bold">
            <button onclick="handleAuth()" class="w-full bg-black text-white p-5 rounded-2xl font-black uppercase">Enter Network</button>
            <p onclick="toggleAuthMode()" id="auth-toggle-text" class="text-center text-[10px] font-bold text-gray-400 mt-4 uppercase">Have account? Login</p>
        </div>
    </div>

    <header>
        <div class="bg-black text-white px-3 py-2 rounded-xl text-[10px] font-black italic">PRODOGE</div>
        <div class="bg-blue-600 text-white px-4 py-2 rounded-xl flex flex-col items-center">
            <span class="text-[6px] font-black uppercase opacity-70 tracking-widest">Hashrate</span>
            <span id="hash-counter" class="text-[10px] font-mono font-bold italic">0.000000</span>
        </div>
        <div class="bg-white border px-3 py-2 rounded-xl">
            <span id="bal" class="text-sm font-black tracking-tighter">0.00</span>
            <span class="text-[8px] font-black text-blue-600 ml-1">ELITE</span>
        </div>
    </header>

    <div id="rec-ui" class="fixed top-24 left-1/2 -translate-x-1/2 z-[110] bg-red-600 text-white px-5 py-2 rounded-full hidden items-center gap-3 shadow-xl">
        <div class="w-2 h-2 bg-white rounded-full recording-pulse"></div>
        <span class="text-[8px] font-black uppercase">Recording...</span>
        <button onclick="stopAndVerify()" class="bg-white text-red-600 px-3 py-1 rounded-lg text-[8px] font-black">VERIFY</button>
    </div>

    <main class="px-6">
        
        <div id="tab-home" class="tab-content active text-center">
            <div class="bg-white p-10 rounded-[3rem] border mb-6 shadow-sm">
                <div class="w-32 h-32 bg-gray-50 rounded-full mx-auto flex items-center justify-center mb-4 border">
                    <span class="text-4xl">💎</span>
                </div>
                <h2 id="yield-display" class="text-3xl font-black italic">+0.000000</h2>
                <p id="staked-val" class="text-[10px] font-bold text-blue-600 uppercase mt-2">0 ELITE Staked</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="startMining()" class="bg-black text-white p-5 rounded-2xl font-black text-[10px] uppercase">Stake All</button>
                <button onclick="harvest()" class="bg-white border p-5 rounded-2xl font-black text-[10px] uppercase">Harvest</button>
            </div>
        </div>

        <div id="tab-tasks" class="tab-content space-y-4">
            <h3 class="font-black text-2xl italic uppercase">Missions</h3>
            <div id="task-list" class="space-y-3"></div>
        </div>

        <div id="tab-ref" class="tab-content">
            <div class="bg-white p-8 rounded-[3rem] border text-center">
                <h3 class="font-black text-xl italic uppercase mb-2">Invite Friends</h3>
                <p class="text-[10px] text-gray-400 font-bold mb-6">Earn 50 ELITE per invite</p>
                <div class="bg-gray-50 p-6 rounded-3xl border-2 border-dashed mb-6">
                    <p class="text-[8px] font-black uppercase text-gray-400">Your Code</p>
                    <h2 id="ref-code-display" class="text-2xl font-black text-blue-600 py-2 italic tracking-widest">...</h2>
                    <button onclick="copyRef()" class="bg-black text-white px-4 py-2 rounded-xl text-[8px] font-black">COPY</button>
                </div>
                <input type="text" id="ref-input" placeholder="Friend's Code" class="w-full p-4 rounded-2xl border bg-gray-50 text-center font-bold text-xs mb-3">
                <button onclick="claimRef()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black text-[10px]">CLAIM 50 ELITE</button>
            </div>
        </div>

        <div id="tab-ads" class="tab-content">
            <div class="bg-white p-8 rounded-[3rem] border">
                <h3 class="font-black text-xl italic uppercase mb-6">Promote Socials</h3>
                <select id="ad-platform" class="w-full p-4 rounded-2xl border bg-gray-50 font-bold text-xs mb-4">
                    <option value="YouTube">YouTube (30 ELITE/Sub)</option>
                    <option value="TikTok">TikTok (20 ELITE/Follow)</option>
                    <option value="Instagram">Instagram (20 ELITE/Follow)</option>
                </select>
                <input type="url" id="ad-url" placeholder="Profile/Channel Link" class="w-full p-4 rounded-2xl border bg-gray-50 font-bold text-xs mb-4">
                <input type="number" id="ad-count" placeholder="Quantity" class="w-full p-4 rounded-2xl border bg-gray-50 font-bold text-xs mb-4">
                <button onclick="createAd()" class="w-full bg-black text-white p-5 rounded-2xl font-black text-[10px] uppercase">Launch Ad</button>
            </div>
        </div>

    </main>

    <nav>
        <button onclick="showTab('home')">🏠</button>
        <button onclick="showTab('tasks')">🛰️</button>
        <button onclick="showTab('ref')">🤝</button>
        <button onclick="showTab('ads')">⚡</button>
    </nav>

    <script>
        const SB_URL = "https://hpxjobaqlhhdziqxulbw.supabase.co";
        const SB_KEY = "sb_publishable_RT99o_ShPhPpnH6F0uNwgQ_p_jSihbj";
        const GEMINI_KEY = "AIzaSyDtwccWCloOrNS6IkVmwq1uhTQSr5s1X_k";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let user = null; let screenStream = null; let activeTaskId = null; let authMode = 'reg';

        window.onload = async () => {
            const { data } = await supabaseClient.auth.getSession();
            if (data.session) loadProfile(data.session.user);
            setInterval(syncMining, 1000);
        };

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const userN = document.getElementById('reg-user').value;

            const { data, error } = authMode === 'reg' ? 
                await supabaseClient.auth.signUp({ email, password: pass, options: { data: { username: userN } } }) :
                await supabaseClient.auth.signInWithPassword({ email, password: pass });

            if (!error) location.reload(); else alert(error.message);
        }

        function toggleAuthMode() {
            authMode = authMode === 'reg' ? 'log' : 'reg';
            document.getElementById('reg-user').style.display = authMode === 'reg' ? 'block' : 'none';
            document.getElementById('auth-toggle-text').innerText = authMode === 'reg' ? 'Have account? Login' : 'New? Register';
        }

        async function loadProfile(u) {
            const { data } = await supabaseClient.from('profiles').select('*').eq('id', u.id).single();
            user = data;
            if (data.bonus_claimed === false) await supabaseClient.rpc('claim_welcome_bonus');
            document.getElementById('bal').innerText = data.tokens.toFixed(2);
            document.getElementById('staked-val').innerText = (data.staked_tokens || 0).toFixed(0) + " ELITE Staked";
            document.getElementById('ref-code-display').innerText = data.referral_code;
            document.getElementById('auth-screen').classList.add('hidden');
            loadTasks();
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
        }

        function syncMining() {
            if (!user || !user.staked_tokens) return;
            const diff = (new Date() - new Date(user.last_sync_time)) / 1000;
            const val = (user.staked_tokens * 0.04 * diff) / 86400;
            document.getElementById('hash-counter').innerText = val.toFixed(6);
            document.getElementById('yield-display').innerText = "+" + val.toFixed(6);
        }

        async function startMining() {
            await supabaseClient.from('profiles').update({ staked_tokens: user.tokens, tokens: 0, last_sync_time: new Date() }).eq('id', user.id);
            location.reload();
        }

        async function harvest() { await supabaseClient.rpc('process_mining_claim'); location.reload(); }

        async function loadTasks() {
            const { data } = await supabaseClient.from('user_tasks').select('*').gt('remaining', 0);
            document.getElementById('task-list').innerHTML = data.map(t => `
                <div class="bg-white p-5 rounded-3xl border flex justify-between items-center shadow-sm">
                    <div><p class="text-[8px] font-black uppercase text-blue-600">${t.platform}</p><p class="text-xs font-black">+${t.reward} ELITE</p></div>
                    <button onclick="startAITask('${t.url}', '${t.id}')" class="bg-black text-white px-5 py-2 rounded-xl text-[9px] font-black uppercase">Earn</button>
                </div>
            `).join('');
        }

        async function startAITask(url, id) {
            screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            document.getElementById('hidden-video').srcObject = screenStream;
            activeTaskId = id;
            document.getElementById('rec-ui').classList.remove('hidden');
            document.getElementById('rec-ui').style.display = 'flex';
            window.open(url, '_blank');
        }

        async function stopAndVerify() {
            const video = document.getElementById('hidden-video');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
            screenStream.getTracks().forEach(t => t.stop());
            document.getElementById('rec-ui').style.display = 'none';

            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Look at screenshot. Reply TRUE if user followed/subscribed. Else FALSE. One word only." }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }] })
            });
            const d = await res.json();
            if (d.candidates[0].content.parts[0].text.toUpperCase().includes("TRUE")) {
                await supabaseClient.rpc('claim_social_reward', { task_id_input: activeTaskId });
                alert("Verified!"); location.reload();
            } else alert("Verification failed.");
        }

        async function createAd() {
            const cost = document.getElementById('ad-platform').value === 'YouTube' ? 30 : 20;
            const qty = document.getElementById('ad-count').value;
            if (user.tokens < (cost * qty)) return alert("Low balance");
            await supabaseClient.from('profiles').update({ tokens: user.tokens - (cost * qty) }).eq('id', user.id);
            await supabaseClient.from('user_tasks').insert([{ creator_id: user.id, platform: document.getElementById('ad-platform').value, url: document.getElementById('ad-url').value, reward: cost-1, remaining: qty }]);
            location.reload();
        }

        function copyRef() { navigator.clipboard.writeText(user.referral_code); alert("Copied!"); }
        async function claimRef() { await supabaseClient.rpc('claim_referral', { target_code: document.getElementById('ref-input').value }); location.reload(); }
    </script>
</body>
    </html>
