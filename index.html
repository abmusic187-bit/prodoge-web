<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRODOGE - SOCIAL ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary-red: #C52127; --teal: #2DD4BF; --bg-offwhite: #F8F9FA; }
        body { background: var(--bg-offwhite); color: #1A1A1A; font-family: 'Inter', sans-serif; }
        
        .social-card { background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        
        /* Screenshot UI Elements */
        .stat-label-box { background: #FF3B30; color: white; padding: 2px 15px; border-radius: 4px; font-weight: 900; font-size: 1.2rem; }
        .balance-box { background: var(--teal); border-radius: 6px; padding: 8px 20px; color: var(--primary-red); font-weight: 900; font-size: 2rem; display: inline-block; min-width: 100px; text-align: center; }
        .red-btn-text { color: var(--primary-red); font-weight: 900; font-size: 1.8rem; text-transform: uppercase; cursor: pointer; }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #splash-screen {
            position: fixed; inset: 0; z-index: 9999; background: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s;
        }
        #splash-screen.hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="pb-24">

    <div id="splash-screen">
        <h1 style="color:var(--primary-red); font-weight:900; font-size:3rem;">PD</h1>
        <p class="text-[10px] uppercase tracking-widest font-bold opacity-40">Loading System...</p>
    </div>

    <div id="app-wrapper">
        
        <div id="tab-profile" class="tab-content active">
            <div class="bg-white p-6 border-b">
                <div class="flex items-center gap-4 mb-6">
                    <img id="view-avatar" src="" class="w-20 h-20 rounded-full border-2 border-teal-400">
                    <div>
                        <div class="flex items-center gap-2">
                            <h2 id="view-username" class="font-bold text-xl uppercase italic">AGENT</h2>
                            <span class="bg-teal-400 text-white text-[10px] px-2 py-0.5 rounded font-bold">Host</span>
                        </div>
                        <p id="view-id" class="text-xs text-gray-400 font-mono">ID: 000000</p>
                    </div>
                </div>

                <div class="flex justify-around text-center mb-4">
                    <div><span class="block font-black text-lg">2</span><span class="text-[10px] uppercase text-gray-400 font-bold">Followed</span></div>
                    <div><span class="block font-black text-lg">16</span><span class="text-[10px] uppercase text-gray-400 font-bold">Following</span></div>
                    <div><span class="block font-black text-lg">1</span><span class="text-[10px] uppercase text-gray-400 font-bold">Friends</span></div>
                </div>

                <div class="flex justify-center gap-10 mt-2">
                    <div class="text-center">
                        <div class="stat-label-box mb-1">LEVEL</div>
                        <span id="view-level" class="font-black text-teal-500">23</span>
                    </div>
                    <div class="text-center">
                        <div class="stat-label-box mb-1">RANK</div>
                        <span id="view-rank" class="font-black text-teal-500">E</span>
                    </div>
                </div>
            </div>

            <div id="owner-controls" class="p-8 space-y-10">
                <div class="flex justify-around gap-4">
                    <div class="text-center">
                        <label class="block text-red-700 font-black text-xl mb-2">PKR</label>
                        <div class="balance-box" id="view-pkr">0</div>
                    </div>
                    <div class="text-center">
                        <label class="block text-red-700 font-black text-xl mb-2">ELITE</label>
                        <div class="balance-box" id="view-elite">0</div>
                    </div>
                </div>

                <div class="flex justify-around">
                    <div class="red-btn-text">Recharge</div>
                    <div class="red-btn-text">Withdrawal</div>
                </div>

                <button onclick="logout()" class="w-full mt-10 text-gray-300 font-black text-xs uppercase tracking-widest border-t pt-4">Terminate Link (Logout)</button>
            </div>

            <div id="visitor-controls" class="hidden p-8 text-center">
                <button onclick="showTab('events')" class="bg-gray-200 px-8 py-3 rounded-full font-bold text-sm">Return to Leaderboard</button>
            </div>
        </div>

        <div id="tab-events" class="tab-content">
            <div class="p-6">
                <h2 class="text-2xl font-black italic uppercase mb-6 text-red-700">Mega Week Leaders</h2>
                <div id="leaderboard-list" class="space-y-3">
                    </div>
            </div>
        </div>

    </div>

    <nav class="fixed bottom-0 inset-x-0 h-20 bg-white border-t flex justify-around items-center px-4">
        <button onclick="viewMyProfile()" class="text-2xl opacity-40 nav-btn" id="nav-profile">👤</button>
        <button onclick="showTab('events')" class="text-2xl opacity-40 nav-btn" id="nav-events">🏆</button>
        <button onclick="alert('Chat Coming Soon')" class="text-2xl opacity-40">💬</button>
    </nav>

    <script>
        const SB_URL = "https://htngfzwclkqsffozxfuo.supabase.co";
        const SB_KEY = "sb_publishable_2LJdcMlfhcEyNl_EMUx-2w_Ms5ZtJ5g";
        const sb = supabase.createClient(SB_URL, SB_KEY);
        let myProfile = null;

        async function init() {
            setTimeout(() => document.getElementById('splash-screen').classList.add('hidden'), 1000);
            
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                const { data } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
                myProfile = data;
                viewMyProfile();
                loadLeaderboard();
            } else {
                // If not logged in, you can add your login redirect here
                alert("Please login first");
            }
        }

        function calculateRank(dep) {
            const d = Number(dep) || 0;
            if (d >= 1000000) return 'S';
            if (d >= 200) return 'D';
            return 'E';
        }

        function viewMyProfile() {
            if (!myProfile) return;
            renderProfile(myProfile, true);
            showTab('profile');
        }

        async function viewOtherUser(userId) {
            const { data } = await sb.from('profiles').select('*').eq('id', userId).single();
            if (data) {
                renderProfile(data, false);
                showTab('profile');
            }
        }

        function renderProfile(user, isOwner) {
            document.getElementById('view-username').innerText = user.username || "Agent";
            document.getElementById('view-id').innerText = "ID: " + user.id.slice(0, 8);
            document.getElementById('view-avatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.id}`;
            document.getElementById('view-rank').innerText = calculateRank(user.total_deposits);
            
            // Hide/Show owner specific elements
            const ownerControls = document.getElementById('owner-controls');
            const visitorControls = document.getElementById('visitor-controls');

            if (isOwner) {
                ownerControls.classList.remove('hidden');
                visitorControls.classList.add('hidden');
                document.getElementById('view-pkr').innerText = user.total_deposits || 0;
                document.getElementById('view-elite').innerText = user.tokens || 0;
            } else {
                ownerControls.classList.add('hidden');
                visitorControls.classList.remove('hidden');
            }
        }

        async function loadLeaderboard() {
            const { data } = await sb.from('profiles').select('username, total_deposits, id').order('total_deposits', { ascending: false }).limit(10);
            if (data) {
                document.getElementById('leaderboard-list').innerHTML = data.map((u, i) => `
                    <div onclick="viewOtherUser('${u.id}')" class="flex items-center justify-between p-4 bg-white rounded-xl shadow-sm border border-gray-100 active:scale-95 transition-transform">
                        <div class="flex items-center gap-3">
                            <span class="font-black text-gray-200 text-xl">#${i + 1}</span>
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${u.id}" class="w-10 h-10 rounded-full bg-gray-50">
                            <div>
                                <p class="font-bold text-sm">${u.username || 'Agent'}</p>
                                <p class="text-[9px] uppercase font-bold text-teal-500">Rank ${calculateRank(u.total_deposits)}</p>
                            </div>
                        </div>
                        <span class="text-red-600 font-black">VIEW</span>
                    </div>`).join('');
            }
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.add('opacity-40'));
            const activeNav = document.getElementById('nav-' + tabId);
            if(activeNav) activeNav.classList.remove('opacity-40');
        }

        async function logout() {
            await sb.auth.signOut();
            location.reload();
        }

        window.onload = init;
    </script>
</body>
</html>
