<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PRODOGE AI NETWORK</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* CSS FROM ALL 3 FILES */
        body { background-color: #F8F8F7; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        header { 
            position: fixed; top: 0; left: 0; right: 0; height: 95px; z-index: 100; 
            background: rgba(248, 248, 247, 0.98); backdrop-filter: blur(15px); 
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        nav { 
            position: fixed; bottom: 20px; left: 20px; right: 20px; height: 85px; 
            z-index: 100; background: white; border-radius: 35px; 
            display: flex; justify-content: space-around; align-items: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05);
        }

        main { padding-top: 115px; padding-bottom: 140px; max-width: 450px; margin: 0 auto; }
        .btn-press:active { transform: scale(0.96); transition: 0.1s; }
        
        .pulse-red { animation: pulse-bg 1.5s infinite; }
        @keyframes pulse-bg { 0% { opacity: 1; } 50% { opacity: 0.4; } }

        .glass-ui { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body>
    <video id="hidden-video" autoplay playsinline muted style="display:none;"></video>

    <div id="auth-screen" class="fixed inset-0 bg-[#F8F8F7] z-[200] p-8 flex flex-col justify-center">
        <div class="text-center mb-12">
            <div class="w-20 h-20 bg-black rounded-[2rem] mx-auto mb-6 flex items-center justify-center shadow-2xl">
                <span class="text-white font-black italic text-3xl">P</span>
            </div>
            <h1 class="text-5xl font-black italic tracking-tighter uppercase">PRODOGE</h1>
            <p class="text-[10px] font-black text-blue-600 uppercase tracking-[0.4em] mt-3">AI NODE TERMINAL</p>
        </div>
        <div class="max-w-sm mx-auto w-full text-center">
            <button onclick="loginWithGoogle()" class="w-full bg-white text-black p-5 rounded-[1.8rem] font-black uppercase text-[11px] btn-press shadow-xl flex items-center justify-center gap-4 border border-gray-200">
                <img src="https://www.google.com/favicon.ico" class="w-5 h-5">
                Continue with Google
            </button>
            <p class="text-[9px] font-black text-gray-400 mt-8 uppercase tracking-widest opacity-60">100 ELITE WELCOME BONUS ACTIVE</p>
        </div>
    </div>

    <div id="rec-ui" class="fixed top-28 left-1/2 -translate-x-1/2 z-[110] glass-ui text-white px-8 py-8 rounded-[3.5rem] hidden flex-col items-center gap-6 shadow-2xl w-[92%] max-w-[340px]">
        <div class="flex items-center gap-3">
            <div class="w-2.5 h-2.5 bg-red-600 rounded-full pulse-red"></div>
            <span class="text-[10px] font-black uppercase tracking-widest text-blue-400">AI Verification</span>
        </div>
        <div id="verify-body" class="text-center">
            <p class="text-[11px] font-bold text-gray-400 leading-relaxed mb-6 uppercase">Perform the action, return here, then verify.</p>
            <button onclick="captureAndVerify()" class="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black text-xs uppercase btn-press shadow-2xl border-b-4 border-blue-800">Verify Mission</button>
        </div>
        <div id="ai-status" class="hidden flex flex-col items-center gap-3 py-4">
            <div class="w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest">🤖 Analyzing...</p>
        </div>
    </div>

    <header>
        <div class="bg-black text-white px-4 py-2 rounded-xl shadow-lg text-[10px] font-black italic">PRODOGE</div>
        <div class="bg-blue-600 text-white px-5 py-2 rounded-2xl shadow-lg flex flex-col items-center min-w-[130px] border-b-4 border-blue-800">
            <span class="text-[6px] font-black uppercase opacity-80 tracking-widest">Mining Core</span>
            <span id="hash-counter" class="text-[11px] font-mono font-bold">0.000000</span>
        </div>
        <div class="bg-white border border-gray-200 px-4 py-2 rounded-2xl shadow-sm flex items-center">
            <span id="bal-display" class="text-sm font-black text-gray-900">0.00</span>
            <span class="text-[7px] font-black text-blue-600 ml-1 uppercase">ELITE</span>
        </div>
    </header>

    <main class="px-6">
        <div id="tab-home" class="tab-content active text-center">
            <div class="bg-white p-12 rounded-[4.5rem] border border-gray-100 shadow-sm mb-8 relative">
                <div class="w-20 h-20 bg-gray-50 rounded-full mx-auto flex items-center justify-center mb-6 text-4xl shadow-inner">💎</div>
                <h2 id="yield-main" class="text-4xl font-black italic tracking-tighter text-gray-900">+0.000000</h2>
                <p id="staked-info" class="text-[10px] font-black text-blue-600 uppercase mt-4 tracking-widest opacity-70">0.00 ELITE STAKED</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="startMining()" class="bg-black text-white p-6 rounded-[2.5rem] font-black uppercase text-[10px] btn-press shadow-xl border-b-4 border-gray-800">Stake All</button>
                <button onclick="harvest()" class="bg-white border border-gray-200 p-6 rounded-[2.5rem] font-black uppercase text-[10px] btn-press shadow-sm">Harvest</button>
            </div>
        </div>

        <div id="tab-tasks" class="tab-content">
            <div class="bg-blue-600 p-6 rounded-[2.5rem] mb-6 shadow-xl border-b-4 border-blue-800 flex justify-between items-center text-white">
                <div>
                    <p class="text-[8px] font-black uppercase tracking-[0.2em] opacity-80">Network Loyalty</p>
                    <h4 class="text-lg font-black italic uppercase tracking-tighter">Daily 50 ELITE</h4>
                </div>
                <button onclick="claimDailyBonus()" class="bg-white text-blue-600 px-6 py-3 rounded-2xl text-[10px] font-black uppercase btn-press shadow-lg">Claim</button>
            </div>
            <h3 class="font-black text-2xl italic uppercase tracking-tighter mb-6">AI Missions</h3>
            <div id="task-list" class="space-y-4"></div>
        </div>

        <div id="tab-ads" class="tab-content">
            <div class="bg-white p-10 rounded-[4rem] border shadow-sm">
                <h3 class="font-black text-2xl italic uppercase mb-8 text-center text-blue-600">Deploy Boost</h3>
                <div class="space-y-4">
                    <select id="ad-platform" class="w-full p-5 border bg-gray-50 font-black text-xs uppercase rounded-2xl outline-none">
                        <option value="YouTube">YouTube Sub</option>
                        <option value="TikTok">TikTok Follow</option>
                        <option value="Instagram">Instagram Follow</option>
                    </select>
                    <input type="url" id="ad-url" placeholder="Paste Social Link" class="w-full p-5 border bg-gray-50 font-black text-xs rounded-2xl outline-none">
                    <input type="number" id="ad-count" placeholder="Target Quantity" class="w-full p-5 border bg-gray-50 font-black text-xs rounded-2xl outline-none">
                    <button onclick="createAd()" class="w-full bg-black text-white p-6 rounded-[2.5rem] font-black uppercase text-[11px] btn-press shadow-xl border-b-4 border-gray-900 mt-4">Broadcast Mission</button>
                </div>
            </div>
        </div>

        <div id="tab-ref" class="tab-content">
            <div class="bg-white p-12 rounded-[4rem] border text-center shadow-sm">
                <h3 class="font-black text-2xl uppercase italic">Network</h3>
                <div class="bg-gray-50 p-10 rounded-[3rem] border-2 border-dashed border-gray-200 my-8">
                    <h2 id="ref-code" class="text-4xl font-black tracking-widest text-blue-600 mb-6 italic uppercase">...</h2>
                    <button onclick="copyRef()" class="bg-black text-white px-8 py-3 rounded-2xl text-[9px] font-black uppercase btn-press shadow-lg">Copy Invite</button>
                </div>
            </div>
        </div>
    </main>

    <nav>
        <button onclick="showTab('home')" id="nav-home">🏠<br><span class="text-[7px] font-black uppercase">Core</span></button>
        <button onclick="showTab('tasks')" id="nav-tasks" class="opacity-40">🛰️<br><span class="text-[7px] font-black uppercase">Missions</span></button>
        <button onclick="showTab('ads')" id="nav-ads" class="opacity-40">⚡<br><span class="text-[7px] font-black uppercase">Boost</span></button>
        <button onclick="showTab('ref')" id="nav-ref" class="opacity-40">🤝<br><span class="text-[7px] font-black uppercase">Invite</span></button>
    </nav>

    <script>
        // --- JAVASCRIPT FROM ALL FILES ---
        const SB_URL = "https://glhxnftqcferpbmujkzt.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."; // Paste your key
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        
        let user = null, activeTaskId = null, globalStream = null;

        // AUTH
        async function loginWithGoogle() {
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin }
            });
            if (error) alert(error.message);
        }

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                let { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
                if (!profile) {
                    const { data: newProfile } = await supabaseClient.from('profiles').insert([{ 
                        id: session.user.id, 
                        username: session.user.user_metadata.full_name || "Node_" + Math.floor(Math.random()*1000),
                        tokens: 100 
                    }]).select().single();
                    profile = newProfile;
                }
                user = profile;
                document.getElementById('auth-screen').style.display = 'none';
                updateUI();
                loadTasks();
                setInterval(updateMiningUI, 1000);
            }
        };

        function updateUI() {
            document.getElementById('bal-display').innerText = user.tokens.toFixed(2);
            document.getElementById('staked-info').innerText = (user.staked_tokens || 0).toFixed(2) + " ELITE STAKED";
            document.getElementById('ref-code').innerText = user.referral_code || "ALPHA";
        }

        // MINING
        function updateMiningUI() {
            if (!user?.staked_tokens) return;
            const diff = (new Date() - new Date(user.last_sync_time)) / 1000;
            const val = (user.staked_tokens * 0.04 * diff) / 86400;
            document.getElementById('hash-counter').innerText = val.toFixed(6);
            document.getElementById('yield-main').innerText = "+" + val.toFixed(6);
        }

        async function harvest() { await supabaseClient.rpc('process_mining_claim'); location.reload(); }
        async function startMining() {
            const total = user.tokens + (user.staked_tokens || 0);
            await supabaseClient.from('profiles').update({ staked_tokens: total, tokens: 0, last_sync_time: new Date().toISOString() }).eq('id', user.id);
            location.reload();
        }

        // DAILY CLAIM
        async function claimDailyBonus() {
            const { data, error } = await supabaseClient.rpc('claim_daily_bonus', { user_id_uuid: user.id });
            if (error) return alert("Already claimed today!");
            alert("50 ELITE Credited!");
            location.reload();
        }

        // AI MISSIONS
        async function startAITask(url, id) {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                globalStream = stream;
                document.getElementById('hidden-video').srcObject = stream;
                activeTaskId = id;
                window.open(url, '_blank');
                document.getElementById('rec-ui').style.display = 'flex';
            } catch (e) { alert("Permission Denied: Screen capture required."); }
        }

        async function captureAndVerify() {
            document.getElementById('verify-body').style.display = 'none';
            document.getElementById('ai-status').classList.remove('hidden');
            const video = document.getElementById('hidden-video');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];

            try {
                const res = await fetch('/api/verify', {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ image: base64 })
                });
                const result = await res.json();
                if (result.success) {
                    await supabaseClient.rpc('claim_social_reward', { task_id_input: activeTaskId });
                    alert("AI VERIFIED!"); location.reload();
                } else { alert("AI REJECTED: Not followed."); location.reload(); }
            } catch (e) { alert("System Error."); location.reload(); }
        }

        async function loadTasks() {
            const { data } = await supabaseClient.from('user_tasks').select('*').gt('remaining', 0).neq('creator_id', user.id);
            const list = document.getElementById('task-list');
            list.innerHTML = data?.map(t => `
                <div class="bg-white p-6 rounded-[2.5rem] border flex justify-between items-center shadow-sm">
                    <div><p class="text-[9px] font-black text-blue-600 uppercase">${t.platform}</p><p class="text-sm font-black">+${t.reward} ELITE</p></div>
                    <button onclick="startAITask('${t.url}', '${t.id}')" class="bg-black text-white px-7 py-3 rounded-2xl text-[9px] font-black uppercase btn-press shadow-lg border-b-4 border-gray-800">Execute</button>
                </div>
            `).join('') || '<p class="text-center text-gray-400 py-10 uppercase text-[9px]">No missions...</p>';
        }

        // BOOST
        async function createAd() {
            const url = document.getElementById('ad-url').value, qty = parseInt(document.getElementById('ad-count').value);
            if (user.tokens < qty * 50) return alert("Insufficient balance.");
            const { error } = await supabaseClient.rpc('deploy_social_boost', { 
                target_url: url, platform_name: document.getElementById('ad-platform').value, 
                target_qty: qty, total_cost: qty * 50 
            });
            if (!error) location.reload();
        }

        // UI TABS
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.style.opacity = '0.4');
            document.getElementById('tab-'+id).classList.add('active');
            document.getElementById('nav-'+id).style.opacity = '1';
        }

        function copyRef() { 
            navigator.clipboard.writeText(window.location.origin + "?ref=" + user.referral_code); 
            alert("Invite Copied!"); 
        }
    </script>
</body>
  </html>
