<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PRODOGE NETWORK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #F8F8F7; color: #000; font-family: sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; overflow-x: hidden; }
        .tab-content { display: none; }
        .active { display: block; }
        
        /* FIXED HEADER LAYOUT */
        header {
            position: fixed; top: 0; left: 0; right: 0; height: 100px; z-index: 100;
            background: rgba(248, 248, 247, 0.9); backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
        }

        /* FIXED NAVIGATION */
        nav {
            position: fixed; bottom: 15px; left: 20px; right: 20px; height: 90px;
            z-index: 100; background: white; border-radius: 35px;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15); border: 1px solid rgba(0,0,0,0.05);
        }

        main { padding-top: 120px; padding-bottom: 140px; overflow-y: auto; }
        .recording-pulse { animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <video id="hidden-video" autoplay muted style="display:none;"></video>

    <header>
        <div class="bg-black text-white px-4 py-2 rounded-2xl shadow-lg">
            <h1 class="text-xs font-black italic">PRODOGE</h1>
        </div>

        <div class="bg-blue-600 text-white px-5 py-2 rounded-2xl shadow-xl flex flex-col items-center min-w-[100px]">
            <span class="text-[6px] font-black uppercase tracking-widest opacity-80">Hash Core</span>
            <span id="live-mining-counter" class="text-[9px] font-mono font-bold italic">0.000000</span>
        </div>

        <div class="bg-white border border-gray-200 px-4 py-2 rounded-2xl shadow-sm">
            <span id="balance-display" class="text-sm font-black tracking-tighter">0.00</span>
            <span class="text-[7px] font-bold text-blue-600 ml-1">ELITE</span>
        </div>
    </header>

    <div id="recording-ui" class="fixed top-28 left-1/2 -translate-x-1/2 z-[110] bg-red-600 text-white px-6 py-3 rounded-full hidden items-center gap-3 shadow-2xl">
        <div class="w-3 h-3 bg-white rounded-full recording-pulse"></div>
        <span class="text-[9px] font-black uppercase">Recording Proof...</span>
        <button onclick="stopAndClaimAI()" class="bg-white text-red-600 px-4 py-1 rounded-lg text-[9px] font-black">VERIFY</button>
    </div>

    <main class="p-6 max-w-md mx-auto">
        
        <div id="dashboard" class="tab-content active text-center">
            <div class="bg-white p-12 rounded-[4rem] border shadow-sm mb-8">
                <div class="w-48 h-48 bg-gray-50 rounded-full mx-auto flex flex-col items-center justify-center border shadow-inner mb-6">
                    <span class="text-3xl">💎</span>
                    <h2 id="live-yield-main" class="text-3xl font-black mt-2">+0.000000</h2>
                </div>
                <p id="staked-display" class="text-xl font-black text-blue-600 tracking-tighter">0 ELITE STAKED</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="startMining()" class="bg-black text-white p-6 rounded-[2.2rem] font-black uppercase text-[10px]">Start Mining</button>
                <button onclick="unlockMining()" class="bg-white text-blue-600 p-6 rounded-[2.2rem] font-black uppercase text-[10px] border">Harvest</button>
            </div>
        </div>

        <div id="tasks" class="tab-content space-y-4">
            <h3 class="font-black text-2xl italic uppercase px-2">Mission Hub</h3>
            <div id="community-tasks" class="space-y-4"></div>
        </div>

        <div id="referral" class="tab-content space-y-6">
            <div class="bg-white p-10 rounded-[3.5rem] border text-center shadow-sm">
                <div class="text-5xl mb-4">🤝</div>
                <h3 class="font-black text-2xl uppercase italic">Network Growth</h3>
                <p class="text-[10px] text-gray-400 font-bold mb-8">Invite friends and you both get 50 ELITE.</p>
                
                <div class="bg-gray-50 p-6 rounded-[2rem] border-2 border-dashed mb-6">
                    <p class="text-[8px] font-black text-gray-400 uppercase">Your Invite Code</p>
                    <h2 id="my-ref-code" class="text-3xl font-black tracking-widest text-blue-600 py-2">...</h2>
                    <button onclick="copyRef()" class="text-[8px] font-black bg-black text-white px-4 py-2 rounded-xl uppercase">Copy Code</button>
                </div>

                <input type="text" id="input-ref" placeholder="Enter Friend's Code" class="w-full p-5 rounded-2xl border bg-gray-50 text-center font-black text-xs mb-3">
                <button onclick="submitRef()" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black uppercase text-[10px]">Claim 50 ELITE</button>
            </div>
        </div>

        <div id="create" class="tab-content space-y-6">
            <div class="bg-white p-10 rounded-[3.5rem] border shadow-sm">
                <h3 class="font-black text-xl italic uppercase mb-6">Boost Socials</h3>
                <input type="url" id="promo-url" placeholder="Channel/Video URL" class="w-full p-5 rounded-2xl border mb-4 text-xs font-bold bg-gray-50">
                <input type="number" id="promo-count" placeholder="How many subs?" class="w-full p-5 rounded-2xl border mb-4 text-xs font-bold bg-gray-50">
                <button onclick="publishAd()" class="w-full bg-black text-white p-6 rounded-[2rem] font-black uppercase text-[10px]">Deploy Ad</button>
            </div>
        </div>

    </main>

    <nav>
        <button onclick="showTab('dashboard')" class="flex flex-col items-center gap-1"><span class="text-2xl">🏠</span><span class="text-[7px] font-black">HOME</span></button>
        <button onclick="showTab('tasks')" class="flex flex-col items-center gap-1"><span class="text-2xl">🛰️</span><span class="text-[7px] font-black">MINE</span></button>
        <button onclick="showTab('referral')" class="flex flex-col items-center gap-1"><span class="text-2xl">🤝</span><span class="text-[7px] font-black">FRIENDS</span></button>
        <button onclick="showTab('create')" class="flex flex-col items-center gap-1"><span class="text-2xl">⚡</span><span class="text-[7px] font-black">ADS</span></button>
    </nav>

    <script>
        const SB_URL = "https://hpxjobaqlhhdziqxulbw.supabase.co";
        const SB_KEY = "sb_publishable_RT99o_ShPhPpnH6F0uNwgQ_p_jSihbj"; 
        const GEMINI_KEY = "AIzaSyDtwccWCloOrNS6IkVmwq1uhTQSr5s1X_k"; 
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        
        let currentUser = null;
        let screenStream = null;
        let activeTaskId = null;

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) { await loadProfile(session.user); }
            setInterval(updateYield, 1000);
        };

        async function loadProfile(user) {
            const { data } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
            if(data) {
                currentUser = data;
                document.getElementById('balance-display').innerText = data.tokens.toFixed(2);
                document.getElementById('staked-display').innerText = (data.staked_tokens || 0).toFixed(0) + " ELITE STAKED";
                document.getElementById('my-ref-code').innerText = data.referral_code;
                loadTasks();
            }
        }

        // --- UI & TABS ---
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function showToast(msg, bg) {
            const t = document.createElement('div');
            t.className = `fixed top-24 left-1/2 -translate-x-1/2 z-[150] ${bg} text-white px-6 py-3 rounded-full font-black text-[10px] uppercase shadow-2xl`;
            t.innerText = msg; document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        // --- MINING & REWARDS ---
        function updateYield() {
            if (!currentUser || !currentUser.staked_tokens) return;
            const diff = (new Date() - new Date(currentUser.last_sync_time)) / 1000;
            const y = (currentUser.staked_tokens * 0.04 * diff) / 86400;
            document.getElementById('live-mining-counter').innerText = y.toFixed(6);
            document.getElementById('live-yield-main').innerText = "+" + y.toFixed(6);
        }

        async function startMining() {
            if (currentUser.tokens <= 0) return alert("Zero balance.");
            await supabaseClient.from('profiles').update({ staked_tokens: currentUser.tokens, tokens: 0, last_sync_time: new Date().toISOString() }).eq('id', currentUser.id);
            location.reload();
        }

        async function unlockMining() { await supabaseClient.rpc('process_mining_claim'); location.reload(); }

        // --- REFERRAL ---
        function copyRef() { navigator.clipboard.writeText(currentUser.referral_code); showToast("Copied!", "bg-black"); }
        async function submitRef() {
            const code = document.getElementById('input-ref').value.trim();
            const { error } = await supabaseClient.rpc('claim_referral', { target_code: code });
            if (!error) { showToast("Referral Claimed!", "bg-green-600"); location.reload(); } else { alert(error.message); }
        }

        // --- AI TASK LOGIC ---
        async function loadTasks() {
            const { data } = await supabaseClient.from('user_tasks').select('*').gt('remaining', 0);
            if (data) document.getElementById('community-tasks').innerHTML = data.map(t => `
                <div class="bg-white p-6 rounded-[2.5rem] border flex justify-between items-center shadow-sm">
                    <div><p class="text-[9px] font-black text-gray-400 uppercase">${t.type}</p><p class="text-blue-600 font-black">+${t.reward} ELITE</p></div>
                    <button onclick="startAITask('${t.url}', '${t.id}')" class="bg-black text-white px-6 py-2 rounded-xl text-[9px] font-black uppercase">Earn</button>
                </div>
            `).join('');
        }

        async function startAITask(url, taskId) {
            screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            document.getElementById('hidden-video').srcObject = screenStream;
            activeTaskId = taskId;
            document.getElementById('recording-ui').style.display = 'flex';
            window.open(url, '_blank');
        }

        async function stopAndClaimAI() {
            const video = document.getElementById('hidden-video');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
            screenStream.getTracks().forEach(t => t.stop());
            document.getElementById('recording-ui').style.display = 'none';

            showToast("AI SCANNING...", "bg-blue-600");

            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [
                    { text: "Reply only TRUE or FALSE. Is this screenshot showing a Subscribed or Following button clicked?" },
                    { inlineData: { mimeType: "image/jpeg", data: base64 } }
                ] }] })
            });
            const d = await res.json();
            const decision = d.candidates[0].content.parts[0].text.trim().toUpperCase();

            if (decision.includes("TRUE")) {
                await supabaseClient.rpc('claim_social_reward', { task_id_input: activeTaskId });
                showToast("VERIFIED!", "bg-green-600"); setTimeout(() => location.reload(), 1500);
            } else { showToast("REJECTED!", "bg-red-600"); }
        }
    </script>
</body>
    </html>
