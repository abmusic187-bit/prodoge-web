<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRODOGE AI v3 - Elite Gmail Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #003B4F; color: white; font-family: 'Chakra Petch', sans-serif; overflow-x: hidden;
            background-image: radial-gradient(circle at center, rgba(0, 85, 115, 0.3) 0%, rgba(0, 30, 40, 1) 100%),
                url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48ZyBzdHJva2U9IiMwMEZBRkYiIHN0cm9rZS13aWR0aD0iMC4wNSIgZmlsbD0ibm9uZSI+PHBhdGggZD0iTTAgMGgxMDB2MTAwSDB6Ii8+PC9nPjwvc3ZnPg==');
            background-size: cover, 60px 60px;
        }
        .hologram-page {
            background: rgba(0, 20, 30, 0.8); border: 1px solid rgba(0, 249, 255, 0.2);
            border-top: 3px solid #00F9FF; border-bottom: 3px solid #00F9FF;
            padding: 1.5rem; border-radius: 12px; box-shadow: 0 0 30px rgba(0, 249, 255, 0.15);
            backdrop-filter: blur(12px); margin-bottom: 1.5rem;
        }
        .admin-card { border-top: 3px solid #7000FF; border-bottom: 3px solid #7000FF; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .admin-input { background: rgba(0,0,0,0.5); border: 1px solid #7000FF; color: white; padding: 12px; border-radius: 8px; width: 100%; font-size: 14px; margin-bottom: 10px; outline: none; }
    </style>
</head>
<body class="pb-28">

    <div id="auth-screen" class="fixed inset-0 z-[200] bg-[#001E28] flex flex-col items-center justify-center p-6 text-center">
        <div class="hologram-page w-full max-w-sm">
            <h1 class="text-3xl font-black mb-10 italic uppercase">PRODOGE_AI</h1>
            <button onclick="login()" class="w-full border-2 border-[#00F9FF] p-5 rounded-md font-bold uppercase tracking-widest">Sync Google Node</button>
        </div>
    </div>

    <header class="p-6 fixed top-0 left-0 right-0 z-50 flex justify-between items-center bg-black/40 backdrop-blur-xl border-b border-[#00F9FF]/20">
        <div>
            <p id="user-display-email" class="text-[10px] font-bold text-[#00F9FF] uppercase tracking-tighter">Linking...</p>
            <h2 class="text-xl font-black italic uppercase">CORE_UNIT</h2>
        </div>
        <div class="border border-[#00F9FF]/40 bg-black/40 px-4 py-2 rounded-lg text-right">
            <span class="text-[7px] text-[#00F9FF] font-bold uppercase">Fuel_Balance</span>
            <div class="flex items-center gap-1">
                <span id="bal" class="text-lg font-mono font-bold text-[#00F9FF]">0.00</span>
                <span class="text-[#00F9FF] text-[10px] font-black">ELITE</span>
            </div>
        </div>
    </header>

    <main class="pt-28 p-6 max-w-md mx-auto">
        <div id="tab-home" class="tab-content active">
            <div class="hologram-page text-center">
                <p class="text-[10px] font-bold text-white/50 uppercase mb-4 tracking-widest">Mining_Output</p>
                <h3 id="yield" class="text-5xl font-mono font-bold text-[#00F9FF] mb-5">0.000000</h3>
                <div class="bg-black/40 border border-[#00F9FF]/20 py-2 px-5 rounded-full inline-block">
                    <span id="staked" class="text-[11px] font-bold text-[#00F9FF]">0.00 Staked</span>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="stake()" class="bg-[#00F9FF] p-6 rounded-md font-black uppercase text-xs text-[#001E28]">Stake_All</button>
                <button onclick="harvest()" class="border-2 border-[#00F9FF] p-6 rounded-md font-black uppercase text-xs">Harvest</button>
            </div>
        </div>

        <div id="tab-tasks" class="tab-content">
            <h2 class="text-2xl font-black italic mb-6 uppercase tracking-tight">MISSION_HUB</h2>
            <div id="task-list" class="space-y-4"></div>
        </div>

        <div id="tab-profile" class="tab-content text-center">
            <h2 class="text-2xl font-black italic mb-6 uppercase">User_Settings</h2>
            <div class="hologram-page">
                <p id="profile-email-full" class="text-xs opacity-60 mb-6"></p>
                <button onclick="sb.auth.signOut().then(() => location.reload())" class="w-full border border-red-500 text-red-500 p-4 rounded-lg font-bold text-xs tracking-widest uppercase">Terminate Session</button>
            </div>
        </div>

        <div id="tab-admin" class="tab-content">
            <h2 class="text-2xl font-black italic mb-6 text-[#7000FF] uppercase">ROOT_ADMIN</h2>
            <div class="hologram-page admin-card">
                <p class="text-[10px] font-bold text-[#7000FF] uppercase mb-4">Modify User Balance</p>
                <input type="text" id="admin-user-email" placeholder="User Gmail Address" class="admin-input">
                <input type="number" id="admin-new-bal" placeholder="New Elite Amount" class="admin-input">
                <button onclick="adminUpdateBalance()" class="w-full bg-[#7000FF] p-3 rounded font-black text-xs uppercase shadow-lg">Override Balance</button>
            </div>
            <div class="hologram-page admin-card">
                <p class="text-[10px] font-bold text-[#7000FF] uppercase mb-4">Deploy Global Mission</p>
                <input type="text" id="task-desc" placeholder="Instruction (e.g. Subscribe to channel)" class="admin-input">
                <input type="number" id="task-reward" placeholder="Reward Amount" class="admin-input">
                <input type="text" id="task-link" placeholder="Task URL" class="admin-input">
                <button onclick="adminAddTask()" class="w-full bg-[#7000FF] p-3 rounded font-black text-xs uppercase shadow-lg">Activate Mission</button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 h-24 backdrop-blur-xl flex justify-center items-center gap-12 p-4 border-t border-[#00F9FF]/10">
        <button onclick="showTab('home')" class="nav-btn text-2xl">🏠</button>
        <button onclick="showTab('tasks')" class="nav-btn text-2xl opacity-50">🛰️</button>
        <button onclick="showTab('profile')" class="nav-btn text-2xl opacity-50">👤</button>
        <button id="admin-nav" onclick="showTab('admin')" class="nav-btn text-2xl opacity-50 hidden">⚙️</button>
    </nav>

    <script>
        const SB_URL = "https://htngfzwclkqsffozxfuo.supabase.co";
        const SB_KEY = "sb_publishable_2LJdcMlfhcEyNl_EMUx-2w_Ms5ZtJ5g";
        const sb = supabase.createClient(SB_URL, SB_KEY);
        let profile = null;

        async function login() { await sb.auth.signInWithOAuth({ provider: 'google' }); }

        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('user-display-email').innerText = session.user.email.split('@')[0];
                document.getElementById('profile-email-full').innerText = session.user.email;
                
                const { data } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
                if (data) {
                    profile = data; 
                    render(); 
                    loadTasks();
                    setInterval(updateMining, 1000);
                    // Strictly check your admin email
                    if (session.user.email === "sa7530006@gmail.com") {
                        document.getElementById('admin-nav').classList.remove('hidden');
                    }
                }
            }
        }

        // --- UPDATED ADMIN FUNCTION: SEARCH BY GMAIL ---
        async function adminUpdateBalance() {
            const email = document.getElementById('admin-user-email').value.trim();
            const bal = document.getElementById('admin-new-bal').value;
            
            if(!email || !bal) return alert("Fill all fields");

            // Searches the profiles table where email matches the input
            const { error } = await sb.from('profiles').update({ tokens: bal }).eq('email', email);
            
            if(error) alert("Error: " + error.message);
            else alert("Success! Balance updated for: " + email);
        }

        async function adminAddTask() {
            const desc = document.getElementById('task-desc').value;
            const reward = document.getElementById('task-reward').value;
            const link = document.getElementById('task-link').value;
            const { error } = await sb.from('tiktok_tasks1').insert([{ description: desc, reward: reward, link: link }]);
            if(error) alert("Error: " + error.message);
            else { alert("Mission Active"); loadTasks(); }
        }

        async function loadTasks() {
            const { data } = await sb.from('tiktok_tasks1').select('*');
            const list = document.getElementById('task-list');
            if (data && data.length > 0) {
                list.innerHTML = data.map(t => `
                    <div class="hologram-page flex justify-between items-center !p-4">
                        <div><p class="text-xs font-bold uppercase">${t.description}</p><p class="text-[9px] text-[#00F9FF]">REWARD: ${t.reward} ELITE</p></div>
                        <button onclick="executeTask('${t.link}', ${t.reward})" class="bg-[#00F9FF] text-black px-4 py-2 rounded-md text-[10px] font-bold uppercase">Open</button>
                    </div>
                `).join('');
            } else { list.innerHTML = "<p class='text-center opacity-50 text-xs'>NO MISSIONS AVAILABLE</p>"; }
        }

        function executeTask(link, reward) {
            window.open(link, '_blank');
            document.getElementById('task-list').innerHTML = `
                <div class="hologram-page text-center">
                    <p class="mb-4 text-sm font-bold uppercase">Mission Link Opened</p>
                    <button onclick="claimReward(${reward})" class="w-full bg-[#00F9FF] text-black p-4 rounded-lg font-black text-lg">CLAIM ${reward} ELITE</button>
                </div>`;
        }

        async function claimReward(reward) {
            const newBal = Number(profile.tokens) + Number(reward);
            const { error } = await sb.from('profiles').update({ tokens: newBal }).eq('id', profile.id);
            if (!error) {
                alert("REWARD CLAIMED!");
                location.reload();
            } else { alert("Error: " + error.message); }
        }

        function render() {
            document.getElementById('bal').innerText = Number(profile.tokens).toFixed(2);
            document.getElementById('staked').innerText = Number(profile.staked_tokens).toFixed(2) + " Staked";
        }

        function updateMining() {
            if (!profile || !profile.staked_tokens) return;
            const diff = (new Date() - new Date(profile.last_sync_time)) / 1000;
            const earned = (profile.staked_tokens * 0.04 * diff) / 86400;
            document.getElementById('yield').innerText = earned.toFixed(6);
        }

        async function harvest() { await sb.rpc('process_mining_claim'); location.reload(); }
        async function stake() { 
            const total = Number(profile.tokens) + Number(profile.staked_tokens);
            await sb.from('profiles').update({ staked_tokens: total, tokens: 0, last_sync_time: new Date().toISOString() }).eq('id', profile.id);
            location.reload();
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('opacity-50'));
            event.currentTarget.classList.remove('opacity-50');
        }

        window.onload = init;
    </script>
</body>
    </html>
