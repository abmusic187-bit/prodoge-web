<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRODOGE AI v3 - Full System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #003B4F; color: white; font-family: 'Chakra Petch', sans-serif; overflow-x: hidden;
            background-image: radial-gradient(circle at center, rgba(0, 85, 115, 0.3) 0%, rgba(0, 30, 40, 1) 100%);
        }

        .hologram-page {
            background: rgba(0, 20, 30, 0.85); border: 1px solid rgba(0, 249, 255, 0.3);
            border-top: 3px solid #00F9FF; padding: 1.5rem; border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 249, 255, 0.2); backdrop-filter: blur(10px); margin-bottom: 1.5rem;
        }

        .neon-text { color: #00F9FF; text-shadow: 0 0 10px rgba(0, 249, 255, 0.7); }

        /* SCANNING ANIMATION */
        #scan-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
        }
        .scan-bar {
            width: 80%; height: 4px; background: #00F9FF; box-shadow: 0 0 20px #00F9FF;
            position: absolute; animation: scanMove 2s infinite ease-in-out;
        }
        @keyframes scanMove { 0% { top: 20%; } 100% { top: 80%; } }

        .tab-content { display: none; }
        .active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="pb-28">

    <div id="auth-screen" class="fixed inset-0 z-[500] bg-[#001E28] flex flex-col items-center justify-center p-6">
        <div class="hologram-page w-full max-w-sm text-center">
            <h1 class="text-3xl font-black mb-8 neon-text uppercase italic">PRODOGE_AI</h1>
            <button onclick="login()" class="w-full border-2 border-[#00F9FF] p-4 rounded-lg font-bold uppercase tracking-widest text-[#00F9FF]">Initialize_Node</button>
        </div>
    </div>

    <div id="scan-overlay">
        <div class="scan-bar"></div>
        <h2 class="neon-text text-xl font-bold italic animate-pulse">SYSTEM_SCANNING_FOLLOW...</h2>
        <p class="text-[10px] mt-4 text-white/50">LINKING GEMINI NEURAL NETWORK</p>
    </div>

    <header class="p-6 fixed top-0 left-0 right-0 z-50 flex justify-between items-center bg-black/40 backdrop-blur-md border-b border-[#00F9FF]/20">
        <div>
            <p id="user-name" class="text-[10px] text-[#00F9FF]">NODE_OFFLINE</p>
            <h2 class="text-xl font-bold neon-text italic">CORE</h2>
        </div>
        <div class="text-right">
            <span class="text-[8px] opacity-60">FUEL_BALANCE</span>
            <div class="flex items-center gap-1">
                <span id="bal" class="text-xl font-mono font-bold text-[#00F9FF]">0.00</span>
                <span class="text-[8px] font-bold">ELITE</span>
            </div>
        </div>
    </header>

    <main class="pt-28 p-6 max-w-md mx-auto">
        <div id="tab-home" class="tab-content active">
            <div class="hologram-page">
                <p class="text-[9px] font-bold text-[#00F9FF] mb-3 uppercase">Social_Identity_Link</p>
                <div id="tk-input-area" class="flex gap-2">
                    <input type="text" id="tk-username" placeholder="@tiktok_user" class="bg-black/50 border border-[#00F9FF]/30 p-3 rounded-lg text-sm w-full text-white outline-none">
                    <button onclick="linkTikTok()" class="bg-[#00F9FF] text-black px-4 font-bold rounded-lg text-xs">LINK</button>
                </div>
                <div id="tk-profile" class="hidden flex items-center gap-3">
                    <img id="tk-avatar" src="" class="w-10 h-10 rounded-full border border-[#00F9FF]">
                    <p id="tk-name-display" class="font-bold text-sm"></p>
                </div>
            </div>

            <div class="hologram-page text-center">
                <p class="text-[10px] opacity-50 mb-2 uppercase">Mining_Output</p>
                <h3 id="yield" class="text-5xl font-mono font-bold neon-text mb-4">0.000000</h3>
                <p id="staked" class="text-[10px] bg-black/40 py-2 px-4 rounded-full border border-[#00F9FF]/20 text-[#00F9FF]">0.00 Staked</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="stake()" class="bg-[#00F9FF] text-black p-4 rounded-lg font-black uppercase text-xs">Stake_All</button>
                <button onclick="harvest()" class="border border-[#00F9FF] p-4 rounded-lg font-black uppercase text-xs">Harvest</button>
            </div>
        </div>

        <div id="tab-tasks" class="tab-content">
            <h2 class="text-xl font-bold mb-4 italic uppercase neon-text">Mission_Hub</h2>
            <div id="task-list" class="space-y-3"></div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-black/80 flex justify-around items-center border-t border-[#00F9FF]/30">
        <button onclick="showTab('home')" class="text-2xl opacity-100">🏠</button>
        <button onclick="showTab('tasks')" class="text-2xl opacity-50">🛰️</button>
        <button onclick="location.reload()" class="text-2xl opacity-50">🔄</button>
    </nav>

    <script>
        const SB_URL = "https://htngfzwclkqsffozxfuo.supabase.co";
        const SB_KEY = "sb_publishable_2LJdcMlfhcEyNl_EMUx-2w_Ms5ZtJ5g";
        const GEMINI_KEY = "AIzaSyBO2ixjcEP2Du--LhzEfKrTy2y2RAw88o8";
        const sb = supabase.createClient(SB_URL, SB_KEY);
        let profile = null; let stream = null;

        async function login() { await sb.auth.signInWithOAuth({ provider: 'google' }); }

        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                document.getElementById('auth-screen').style.display = 'none';
                const { data } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
                if (data) { profile = data; render(); updateTikTokUI(); loadTasks(); setInterval(updateMining, 1000); }
            }
        }

        function render() {
            document.getElementById('user-name').innerText = profile.username || "NODE_ACTIVE";
            document.getElementById('bal').innerText = Number(profile.tokens).toFixed(2);
            document.getElementById('staked').innerText = Number(profile.staked_tokens).toFixed(2) + " STAKED";
        }

        async function linkTikTok() {
            const user = document.getElementById('tk-username').value.replace('@', '');
            if(!user) return;
            const av = `https://api.dicebear.com/7.x/bottts/svg?seed=${user}`;
            const { error } = await sb.from('profiles').update({ tiktok_username: user, tiktok_avatar: av }).eq('id', profile.id);
            if(!error) { profile.tiktok_username = user; profile.tiktok_avatar = av; updateTikTokUI(); }
        }

        function updateTikTokUI() {
            if(profile.tiktok_username) {
                document.getElementById('tk-input-area').classList.add('hidden');
                document.getElementById('tk-profile').classList.remove('hidden');
                document.getElementById('tk-avatar').src = profile.tiktok_avatar;
                document.getElementById('tk-name-display').innerText = '@' + profile.tiktok_username;
            }
        }

        function loadTasks() {
            const tasks = [{ handle: 'prodoge_ai', reward: 18 }];
            document.getElementById('task-list').innerHTML = tasks.map(t => `
                <div class="hologram-page flex justify-between items-center">
                    <div><p class="text-xs font-bold uppercase">Follow @${t.handle}</p><p class="text-[9px] text-[#00F9FF]">+${t.reward} ELITE</p></div>
                    <button onclick="executeTask('${t.handle}')" class="bg-[#00F9FF] text-black px-4 py-2 rounded font-bold text-[10px]">EXECUTE</button>
                </div>
            `).join('');
        }

        async function executeTask(h) {
            try {
                stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                window.open(`https://tiktok.com/@${h}`);
                document.getElementById('task-list').innerHTML = `<button onclick="verifyFollow()" class="w-full bg-white text-black p-6 rounded-lg font-black shadow-[0_0_20px_#fff]">RETURN & VERIFY SCAN</button>`;
            } catch (e) { alert("Permission Denied."); }
        }

        async function verifyFollow() {
            document.getElementById('scan-overlay').style.display = 'flex';
            const vid = document.createElement('video'); vid.srcObject = stream; vid.play();
            await new Promise(r => setTimeout(r, 1500));
            const canvas = document.createElement('canvas'); canvas.width = 720; canvas.height = 1280;
            canvas.getContext('2d').drawImage(vid, 0, 0, 720, 1280);
            const base64 = canvas.toDataURL('image/jpeg').split(',')[1];
            stream.getTracks().forEach(t => t.stop());

            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: "Look at the follow button. Is it 'Following' or 'Friends'? Answer YES or NO." }, { inline_data: { mime_type: "image/jpeg", data: base64 } }] }] })
            });
            const data = await res.json();
            if (data.candidates[0].content.parts[0].text.toUpperCase().includes("YES")) {
                await sb.from('profiles').update({ tokens: profile.tokens + 18 }).eq('id', profile.id);
                alert("SUCCESS: +18 COINS RECEIVED");
            } else { alert("SCAN FAILED: ACCOUNT NOT FOLLOWED"); }
            location.reload();
        }

        function updateMining() {
            if (!profile || !profile.staked_tokens) return;
            const diff = (new Date() - new Date(profile.last_sync_time)) / 1000;
            const earned = (profile.staked_tokens * 0.04 * diff) / 86400;
            document.getElementById('yield').innerText = earned.toFixed(6);
        }

        async function harvest() { await sb.rpc('process_mining_claim'); location.reload(); }
        async function stake() { 
            const t = Number(profile.tokens) + Number(profile.staked_tokens);
            await sb.from('profiles').update({ staked_tokens: t, tokens: 0, last_sync_time: new Date().toISOString() }).eq('id', profile.id);
            location.reload();
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
        }

        window.onload = init;
    </script>
</body>
</html>
