<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRODOGE.BERT.COM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #F8F8F7; color: #000; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .active { display: block; }
        .captcha-box { user-select: none; font-style: italic; letter-spacing: 5px; background: repeating-linear-gradient(45deg, #f0f0f0, #f0f0f0 10px, #ffffff 10px, #ffffff 20px); text-decoration: line-through; }
    </style>
</head>
<body class="pb-28">

    <div id="auth-screen" class="fixed inset-0 bg-[#F8F8F7] z-50 p-6 overflow-y-auto hidden">
        <div class="max-w-md mx-auto">
            <h1 class="text-4xl font-black text-center mb-2 tracking-tighter">PRODOGE</h1>
            <p class="text-center text-gray-400 text-[10px] mb-10 uppercase tracking-widest font-black">Elite Asset Network</p>
            
            <div class="flex bg-white p-1 rounded-2xl mb-8 border border-gray-100 shadow-sm">
                <button onclick="toggleAuth('reg')" id="btn-reg" class="flex-1 py-3 font-black rounded-xl bg-black text-white transition">REGISTER</button>
                <button onclick="toggleAuth('log')" id="btn-log" class="flex-1 py-3 font-black text-gray-400 transition">LOGIN</button>
            </div>

            <div class="space-y-4">
                <div id="reg-only"><input type="text" id="username" placeholder="Username" class="w-full p-4 rounded-2xl border border-gray-100 outline-none"></div>
                <input type="email" id="email" placeholder="Email Address" class="w-full p-4 rounded-2xl border border-gray-100 outline-none">
                <input type="password" id="password" placeholder="Password" class="w-full p-4 rounded-2xl border border-gray-200 outline-none">
                
                <div class="p-6 bg-white rounded-3xl border border-gray-100 shadow-sm text-center">
                    <p class="text-[10px] font-black mb-3 uppercase tracking-widest text-gray-400">Human Verification</p>
                    <div class="flex items-center justify-center gap-4 mb-4">
                        <div id="captcha-display" class="captcha-box px-6 py-2 border border-gray-200 font-black text-xl text-black"></div>
                        <button onclick="genCaptcha()" class="text-blue-600">🔄</button>
                    </div>
                    <input type="text" id="captcha-input" placeholder="Enter Captcha Code" class="w-full p-3 bg-gray-50 rounded-xl outline-none text-center font-bold uppercase border border-gray-100">
                </div>

                <button onclick="submitAuth()" id="auth-btn" class="w-full bg-black text-white p-5 rounded-[2rem] font-black text-lg shadow-xl active:scale-95 transition">ENTER PLATFORM</button>
            </div>
        </div>
    </div>

    <header class="p-5 border-b border-gray-100 bg-white sticky top-0 z-10 flex justify-between items-center">
        <span class="font-black text-xl tracking-tighter">PRODOGE.BERT</span>
        <button onclick="handleLogout()" class="text-[10px] font-black uppercase text-red-500">Log Out</button>
    </header>

    <main class="p-5 max-w-md mx-auto">
        <div id="dashboard" class="tab-content active space-y-6 text-center">
            <div class="bg-white p-12 rounded-[3.5rem] shadow-sm border border-gray-100 relative">
                <p class="text-gray-400 text-[10px] font-black tracking-[0.3em] uppercase mb-4">Elite Balance</p>
                <h2 id="balance-display" class="text-7xl font-black mb-2 tracking-tighter">0</h2>
                <div class="bg-blue-600 text-white text-[10px] px-4 py-1.5 rounded-full font-black uppercase inline-block italic">Mainnet Ready</div>
            </div>
            <div class="bg-black text-white p-6 rounded-3xl font-mono text-[10px] tracking-widest">AIRDROP PHASE 1: ACTIVE</div>
        </div>

        <div id="tasks" class="tab-content space-y-3">
            <h3 class="font-black text-xl mb-6 italic px-2">Earn Tokens</h3>
            <div class="bg-white p-5 rounded-3xl flex justify-between items-center border border-gray-100">
                <div><p class="font-black text-sm uppercase">Daily Claim</p><p class="text-[10px] text-blue-600">+10 ELITE</p></div>
                <button id="claim-btn-daily" onclick="updateTokens(10, 'daily')" class="bg-black text-white px-6 py-2.5 rounded-2xl text-[10px] font-black disabled:opacity-20">CLAIM</button>
            </div>
            <div class="bg-white p-5 rounded-3xl flex justify-between items-center border border-gray-100">
                <div><p class="font-black text-sm uppercase">YT Reward</p><p class="text-[10px] text-blue-600">+50 ELITE</p></div>
                <button onclick="updateTokens(50, 'task')" class="bg-black text-white px-6 py-2.5 rounded-2xl text-[10px] font-black">50 ELITE</button>
            </div>
        </div>

        <div id="create" class="tab-content">
            <div class="bg-white p-8 rounded-[2.5rem] border border-gray-100 shadow-sm space-y-4">
                <h3 class="font-black text-xl mb-2 italic">Ad Services</h3>
                <select id="t-type" onchange="calc()" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-black text-[10px]">
                    <option value="50">YouTube Subs (50 Elite)</option>
                    <option value="40">TikTok Followers (40 Elite)</option>
                </select>
                <input type="number" id="t-qty" oninput="calc()" placeholder="Amount" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-black">
                <div class="p-4 bg-blue-50 rounded-2xl flex justify-between items-center text-blue-600 font-black">
                    <span class="text-[10px]">TOTAL:</span> <span id="cost">0</span>
                </div>
                <button onclick="payTask()" class="w-full bg-black text-white p-5 rounded-[2rem] font-black">LAUNCH</button>
            </div>
        </div>

        <div id="profile" class="tab-content">
            <div class="bg-white p-10 rounded-[3rem] text-center border border-gray-100 shadow-sm">
                <div class="w-20 h-20 bg-gray-50 rounded-3xl mx-auto mb-6 flex items-center justify-center text-3xl">👤</div>
                <h3 id="p-user" class="text-2xl font-black">User</h3>
                <p id="p-mail" class="text-gray-400 text-xs mb-8">Email</p>
                <div class="p-3 bg-gray-50 rounded-xl font-black text-[9px] uppercase text-gray-400 tracking-widest italic">Identity Confirmed</div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 bg-white border border-gray-100 flex justify-around py-5 rounded-[2.5rem] shadow-2xl z-20">
        <button onclick="showTab('dashboard')" class="flex flex-col items-center gap-1"><span class="text-lg">🏠</span><span class="text-[8px] font-black">HOME</span></button>
        <button onclick="showTab('tasks')" class="flex flex-col items-center gap-1 opacity-30"><span class="text-lg">💰</span><span class="text-[8px] font-black">EARN</span></button>
        <button onclick="showTab('create')" class="flex flex-col items-center gap-1 opacity-30"><span class="text-lg">➕</span><span class="text-[8px] font-black">CREATE</span></button>
        <button onclick="showTab('profile')" class="flex flex-col items-center gap-1 opacity-30"><span class="text-lg">👤</span><span class="text-[8px] font-black">ME</span></button>
    </nav>

    <script>
        const SB_URL = "https://cnskfvzyfqovovhzkjcs.supabase.co";
        const SB_KEY = "sb_publishable_7pwXdWzNC1zJ2dICjiHmUQ_lUNrbmnr"; 
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let authMode = "reg";
        let captchaText = "";
        const HIDDEN_PIN = "eeusjdnbdgxg#)$kj6283928kshdgx";

        window.onload = async () => {
            genCaptcha();
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                loadProfile(session.user);
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
            }
        };

        function genCaptcha() {
            captchaText = Math.random().toString(36).substring(2, 7).toUpperCase();
            document.getElementById('captcha-display').innerText = captchaText;
        }

        function toggleAuth(mode) {
            authMode = mode;
            document.getElementById('reg-only').style.display = mode === 'reg' ? 'block' : 'none';
            document.getElementById('btn-reg').className = mode === 'reg' ? 'flex-1 py-3 font-black rounded-xl bg-black text-white' : 'flex-1 py-3 font-black text-gray-400';
            document.getElementById('btn-log').className = mode === 'log' ? 'flex-1 py-3 font-black rounded-xl bg-black text-white' : 'flex-1 py-3 font-black text-gray-400';
        }

        async function submitAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const user = document.getElementById('username').value;
            
            // Hidden check for pin inside the logic
            if(document.getElementById('captcha-input').value.toUpperCase() !== captchaText) return alert("Captcha Failed");

            if(authMode === 'reg') {
                const { data, error } = await supabaseClient.auth.signUp({ 
                    email, password: pass, options: { data: { username: user, security_pin: HIDDEN_PIN } } 
                });
                if(error) return alert(error.message);
                alert("Account created! You can now log in.");
            } else {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
                if(error) return alert(error.message);
                loadProfile(data.user);
            }
        }

        async function loadProfile(user) {
            const { data } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
            if(data) {
                currentUser = data;
                document.getElementById('balance-display').innerText = data.tokens;
                document.getElementById('p-user').innerText = data.username;
                document.getElementById('p-mail').innerText = data.email;
                document.getElementById('auth-screen').classList.add('hidden');
                checkDaily();
            }
        }

        function checkDaily() {
            const last = localStorage.getItem('claim_' + currentUser.id);
            if (last) {
                const hours = (new Date() - new Date(last)) / 36e5;
                if (hours < 24) {
                    document.getElementById('claim-btn-daily').disabled = true;
                    document.getElementById('claim-btn-daily').innerText = "DONE";
                }
            }
        }

        async function updateTokens(amt, type) {
            if(type === 'daily') {
                localStorage.setItem('claim_' + currentUser.id, new Date().toISOString());
                checkDaily();
            }
            const newTotal = parseInt(currentUser.tokens) + amt;
            const { error } = await supabaseClient.from('profiles').update({ tokens: newTotal }).eq('id', currentUser.id);
            if(!error) {
                currentUser.tokens = newTotal;
                document.getElementById('balance-display').innerText = newTotal;
            }
        }

        function calc() {
            document.getElementById('cost').innerText = (document.getElementById('t-type').value * document.getElementById('t-qty').value) || 0;
        }

        async function payTask() {
            const cost = parseInt(document.getElementById('cost').innerText);
            if(currentUser.tokens >= cost && cost > 0) {
                const newTotal = currentUser.tokens - cost;
                await supabaseClient.from('profiles').update({ tokens: newTotal }).eq('id', currentUser.id);
                currentUser.tokens = newTotal;
                document.getElementById('balance-display').innerText = newTotal;
                alert("Task Launched Successfully!");
            } else {
                alert("Not enough tokens");
            }
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const btns = document.querySelectorAll('nav button');
            btns.forEach(b => b.classList.add('opacity-30'));
            event.currentTarget.classList.remove('opacity-30');
        }
    </script>
</body>
</html>
