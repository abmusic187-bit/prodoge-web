<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRODOGE NETWORK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #F8F8F7; color: #000; font-family: sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        .tab-content { display: none; }
        .active { display: block; }
        #splash-loader { transition: opacity 0.5s ease, visibility 0.5s; }
        .pulse-logo { animation: pulse 1.5s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.95); } }
        .spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .loader-spin { border: 2px solid #ccc; border-top: 2px solid #000; border-radius: 50%; width: 14px; height: 14px; animation: spin 0.8s linear infinite; display: inline-block; }
    </style>
</head>
<body class="pb-32">

    <div id="splash-loader" class="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center">
        <h1 class="text-white text-4xl font-black italic pulse-logo tracking-tighter">PRODOGE</h1>
        <p class="text-blue-600 text-[8px] font-black tracking-[0.5em] mt-4 uppercase">Initializing Node...</p>
    </div>

    <div class="fixed top-6 right-6 z-30 bg-white/90 backdrop-blur-md border border-gray-100 px-4 py-2 rounded-2xl shadow-sm flex items-center gap-2">
        <span class="text-[9px] font-black text-blue-600">BAL</span>
        <span id="balance-display" class="text-lg font-black tracking-tighter">0.000</span>
    </div>

    <div id="auth-screen" class="fixed inset-0 bg-[#F8F8F7] z-50 p-6 hidden text-center overflow-y-auto">
        <div class="max-w-md mx-auto pt-16">
            <h1 class="text-5xl font-black mb-10 italic">PRODOGE</h1>
            <div class="flex bg-white p-1 rounded-2xl mb-8 border border-gray-100">
                <button onclick="toggleAuth('reg')" id="btn-reg" class="flex-1 py-4 font-black rounded-xl bg-black text-white">REG</button>
                <button onclick="toggleAuth('log')" id="btn-log" class="flex-1 py-4 font-black text-gray-400">LOG</button>
            </div>
            <div class="space-y-4">
                <div id="reg-only" class="space-y-4">
                    <input type="text" id="username" placeholder="Username" class="w-full p-5 rounded-2xl border outline-none font-bold">
                    <input type="password" id="sec-code" placeholder="Master Pin" class="w-full p-5 rounded-2xl border outline-none font-bold text-center">
                </div>
                <input type="email" id="email" placeholder="Email" class="w-full p-5 rounded-2xl border outline-none font-bold">
                <input type="password" id="password" placeholder="Password" class="w-full p-5 rounded-2xl border outline-none font-bold">
                <button onclick="submitAuth(this)" class="w-full bg-black text-white p-6 rounded-[2.5rem] font-black uppercase text-sm">Access Network</button>
            </div>
        </div>
    </div>

    <main class="pt-20 p-6 max-w-md mx-auto">
        <div id="dashboard" class="tab-content text-center active">
            <div class="bg-white p-10 rounded-[3.5rem] border border-gray-100 shadow-sm mb-6">
                <div class="relative w-52 h-52 mx-auto mb-8">
                    <div class="absolute inset-0 rounded-full border-4 border-dashed border-blue-600/20 spin-slow"></div>
                    <div class="absolute inset-4 bg-gray-50 rounded-full flex flex-col items-center justify-center border shadow-inner">
                        <span class="text-3xl animate-pulse">💎</span>
                        <p class="text-[7px] font-black text-blue-600 mt-2 tracking-[0.3em] uppercase">Mining Yield</p>
                        <h2 id="live-yield" class="text-2xl font-black mt-1">+0.000000</h2>
                    </div>
                </div>
                <div class="space-y-1">
                    <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Locked in Machine</p>
                    <div class="flex justify-center items-baseline gap-1">
                        <span id="staked-display" class="text-4xl font-black">0</span>
                        <span class="text-xs font-bold text-blue-600">ELITE</span>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="startMining()" class="bg-black text-white p-5 rounded-[2rem] font-black uppercase text-[9px]">Start Machine</button>
                <button onclick="unlockMining()" class="bg-white text-blue-600 p-5 rounded-[2rem] font-black uppercase text-[9px] border border-blue-100">Unlock & Claim</button>
            </div>
        </div>

        <div id="leaderboard" class="tab-content space-y-3">
            <h3 class="font-black text-2xl italic px-2 uppercase">Top Miners</h3>
            <div id="leaderboard-list"></div>
        </div>

        <div id="tasks" class="tab-content space-y-4">
            <h3 class="font-black text-2xl italic px-2 uppercase">Mission Hub</h3>
            <div id="community-tasks" class="space-y-4"></div>
        </div>

        <div id="create" class="tab-content space-y-4">
            <div class="bg-white p-8 rounded-[3.5rem] border border-gray-100 shadow-sm">
                <h3 class="font-black text-2xl mb-2 italic uppercase">Boost Socials</h3>
                <div class="space-y-4">
                    <select id="promo-type" class="w-full p-4 rounded-2xl border bg-gray-50 font-bold outline-none text-xs">
                        <option value="YouTube">YouTube Subscribe (30 ELITE)</option>
                        <option value="TikTok">TikTok Follow (20 ELITE)</option>
                        <option value="Instagram">Instagram Follow (20 ELITE)</option>
                    </select>
                    <input type="url" id="promo-url" placeholder="Paste Profile Link" class="w-full p-4 rounded-2xl border outline-none font-bold text-xs">
                    <input type="number" id="promo-count" placeholder="Quantity" class="w-full p-4 rounded-2xl border outline-none font-bold text-xs">
                    <button onclick="publishAd(this)" class="w-full bg-black text-white p-5 rounded-[2rem] font-black uppercase text-[10px]">Publish Campaign</button>
                </div>
            </div>
        </div>

        <div id="wallet" class="tab-content">
            <div class="bg-white p-8 rounded-[3.5rem] border border-gray-100 text-center">
                <div class="w-20 h-20 bg-blue-600 rounded-full mx-auto mb-4 flex items-center justify-center text-white text-3xl font-black" id="user-initial">P</div>
                <h3 id="display-username" class="font-black text-2xl uppercase tracking-tighter">USER</h3>
                <p id="display-email" class="text-[9px] text-gray-400 font-bold mb-8 italic">loading...</p>
                <input type="text" id="wallet-addr" placeholder="Wallet Address" class="w-full p-5 bg-gray-50 rounded-2xl outline-none font-mono text-center font-bold text-[10px] border mb-4">
                <button onclick="saveWallet(this)" class="w-full bg-black text-white p-5 rounded-[2rem] font-black uppercase text-[9px]">Save Changes</button>
                <hr class="my-6 border-gray-100">
                <button onclick="handleLogout()" class="w-full bg-red-50 text-red-500 p-5 rounded-[2rem] font-black uppercase text-[9px]">Log Out</button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-8 left-6 right-6 bg-white/95 backdrop-blur-2xl border flex justify-around items-center py-4 rounded-[3rem] shadow-2xl z-20">
        <button onclick="showTab('dashboard')" class="nav-btn flex flex-col items-center gap-1"><span class="text-xl">🏠</span><span class="text-[8px] font-black">HOME</span></button>
        <button onclick="showTab('leaderboard')" class="nav-btn flex flex-col items-center gap-1 opacity-30"><span class="text-xl">🏆</span><span class="text-[8px] font-black">RANKS</span></button>
        <button onclick="showTab('tasks')" id="mine-btn-central" class="nav-btn -mt-12 bg-black text-white w-16 h-16 rounded-full flex flex-col items-center justify-center shadow-xl border-4 border-[#F8F8F7]"><span class="text-2xl">💰</span><span class="text-[7px] font-black">MINE</span></button>
        <button onclick="showTab('wallet')" class="nav-btn flex flex-col items-center gap-1 opacity-30"><span class="text-xl">👤</span><span class="text-[8px] font-black">USER</span></button>
        <button onclick="showTab('create')" class="nav-btn flex flex-col items-center gap-1 opacity-30"><span class="text-xl">⚡</span><span class="text-[8px] font-black">ADS</span></button>
    </nav>

    <script>
        // CONFIG - YOUR KEYS ARE LOADED
        const SB_URL = "https://hpxjobaqlhhdziqxulbw.supabase.co";
        const SB_KEY = "sb_publishable_RT99o_ShPhPpnH6F0uNwgQ_p_jSihbj"; 
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        
        let currentUser = null;
        let authMode = "reg";
        const MASTER_PIN = "eeusjdnbdgxg#)$kj6283928kshdgx";

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) { await loadProfile(session.user); } 
            else { document.getElementById('auth-screen').classList.remove('hidden'); }
            
            setTimeout(() => {
                document.getElementById('splash-loader').style.opacity = '0';
                setTimeout(() => document.getElementById('splash-loader').style.display = 'none', 500);
            }, 1500);

            showTab(localStorage.getItem('activeTab') || 'dashboard');
            setInterval(updateLiveYield, 1000);
        };

        async function loadProfile(user) {
            const { data } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
            if(data) {
                currentUser = data;
                document.getElementById('balance-display').innerText = data.tokens.toFixed(3);
                document.getElementById('staked-display').innerText = data.staked_tokens || 0;
                document.getElementById('display-username').innerText = data.username || "User";
                document.getElementById('display-email').innerText = user.email;
                document.getElementById('user-initial').innerText = (data.username || "P").charAt(0).toUpperCase();
                document.getElementById('auth-screen').classList.add('hidden');
                loadCommunityTasks(); loadLeaderboard();
            }
        }

        async function publishAd(btn) {
            const type = document.getElementById('promo-type').value;
            const url = document.getElementById('promo-url').value;
            const count = parseInt(document.getElementById('promo-count').value);
            const cost = type === 'YouTube' ? 30 : 20;
            const reward = type === 'YouTube' ? 29.009 : 19.009;

            if (!url || isNaN(count)) return alert("Missing Info");
            if (currentUser.tokens < (count * cost)) return alert("Low Balance");

            btn.disabled = true;
            const { error } = await supabaseClient.from('profiles').update({ tokens: currentUser.tokens - (count * cost) }).eq('id', currentUser.id);
            await supabaseClient.from('user_tasks').insert([{ creator_id: currentUser.id, type, url, reward, remaining: count }]);
            location.reload();
        }

        async function loadCommunityTasks() {
            const { data } = await supabaseClient.from('user_tasks').select('*').gt('remaining', 0);
            if (data) {
                document.getElementById('community-tasks').innerHTML = data.map(t => `
                    <div class="bg-white p-5 rounded-[2rem] border flex justify-between items-center shadow-sm">
                        <div><p class="font-black text-[10px] uppercase">${t.type}</p><p class="text-[11px] text-blue-600 font-black">+${t.reward} ELITE</p></div>
                        <button onclick="claimReward('${t.url}', '${t.id}')" class="bg-black text-white px-6 py-3 rounded-2xl text-[8px] font-black">GO</button>
                    </div>
                `).join('');
            }
        }

        async function claimReward(url, taskId) {
            window.open(url, '_blank');
            const { error } = await supabaseClient.rpc('claim_social_reward', { task_id_input: taskId });
            if (!error) location.reload();
        }

        function updateLiveYield() {
            if (!currentUser || !currentUser.staked_tokens) return;
            const seconds = (new Date() - new Date(currentUser.last_sync_time)) / 1000;
            const yieldAmt = (currentUser.staked_tokens * 0.04 * seconds) / 86400;
            document.getElementById('live-yield').innerText = "+" + yieldAmt.toFixed(6);
        }

        async function startMining() {
            if (currentUser.tokens <= 0) return alert("Empty");
            await supabaseClient.from('profiles').update({ staked_tokens: currentUser.tokens, tokens: 0, last_sync_time: new Date().toISOString() }).eq('id', currentUser.id);
            location.reload();
        }

        async function unlockMining() { await supabaseClient.rpc('process_mining_claim'); location.reload(); }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            localStorage.setItem('activeTab', id);
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('opacity-30'));
            const activeBtn = Array.from(document.querySelectorAll('.nav-btn')).find(b => b.getAttribute('onclick').includes(`'${id}'`));
            if(activeBtn) activeBtn.classList.remove('opacity-30');
        }

        async function submitAuth(btn) {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const user = document.getElementById('username').value;
            if(authMode === 'reg' && document.getElementById('sec-code').value !== MASTER_PIN) return alert("Pin Error");
            const { data, error } = authMode === 'reg' ? 
                await supabaseClient.auth.signUp({ email, password: pass, options: { data: { username: user } } }) :
                await supabaseClient.auth.signInWithPassword({ email, password: pass });
            if(!error) location.reload(); else alert(error.message);
        }

        function toggleAuth(m) { authMode = m; document.getElementById('reg-only').style.display = m === 'reg' ? 'block' : 'none'; }
        async function handleLogout() { localStorage.clear(); await supabaseClient.auth.signOut(); location.reload(); }
        async function saveWallet(btn) { await supabaseClient.from('profiles').update({ wallet_address: document.getElementById('wallet-addr').value }).eq('id', currentUser.id); btn.innerText = "SAVED"; }
        async function loadLeaderboard() {
            const { data } = await supabaseClient.from('profiles').select('username, tokens').order('tokens', { ascending: false }).limit(5);
            if (data) document.getElementById('leaderboard-list').innerHTML = data.map((u, i) => `<div class="bg-white p-5 rounded-3xl flex justify-between border mb-2 font-black italic text-xs"><span>#${i+1} ${u.username}</span><span class="text-blue-600">${u.tokens.toFixed(2)}</span></div>`).join('');
        }
    </script>
</body>
        </html>
